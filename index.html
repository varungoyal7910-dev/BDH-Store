<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Varun Store | Official</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1 class="premium-logo">VARUN  STORE</h1>
    </header>

    <!-- Search & Price Filters -->
    <div class="search-section">
        <input type="text" id="searchBar" placeholder="Search products..." onkeyup="filterProducts()">
        <div class="price-chips">
            <button onclick="filterByPrice(99)">Under 99</button>
            <button onclick="filterByPrice(149)">Under 149</button>
            <button onclick="filterByPrice(199)">Under 199</button>
            <button onclick="filterByPrice(499)">Under 499</button>
        </div>
    </div>

    <!-- Product Grid -->
    <div id="product-container" class="grid"></div>

    <!-- My Orders Section -->
    <div class="my-orders-container">
        <h2>📦 My Orders</h2>
        <div id="orders-list">
            <!-- Orders with Replace Button will appear here -->
        </div>
    </div>

    <!-- Checkout Modal -->
    <div id="checkout-modal" class="modal">
        <div class="modal-content">
            <div id="delivery-page">
                <h2>Delivery Details</h2>
                <input type="text" id="userName" placeholder="Full Name" required>
                <input type="tel" id="userPhone" placeholder="Phone (10 Digits)" maxlength="10" minlength="10" required>
                <input type="text" id="userAddress" placeholder="Full Address" required>
                <input type="text" id="userPincode" placeholder="Pincode (6 Digits)" maxlength="6" minlength="6" required>
                <button onclick="goToPayment()" class="next-btn">Next: Payment</button>
            </div>

            <div id="payment-page" style="display:none;">
                <h2>Payment Details</h2>
                <div class="upi-box">
                    <span id="upiId">VARUNSTORE@OKAXIS</span>
                    <button onclick="copyUPI()" class="copy-btn">📋 Copy</button>
                </div>
                <div id="timer" class="timer-display">02:00</div>
                <p class="warning">*Ref No. bharna important hai!</p>
                <input type="text" id="payRef" placeholder="Enter Ref No." required>
                <button onclick="confirmOrder()" class="confirm-btn">Confirm Order</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
