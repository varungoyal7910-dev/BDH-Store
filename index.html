<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Varun Store | Pro Shop</title>
    <style>
        :root { --amz-navy: #131921; --amz-yellow: #febd69; --amz-orange: #f3a847; --bg: #f0f2f2; }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background: var(--bg); padding-bottom: 75px; color: #0f1111; }

        /* HEADER */
        header { background: var(--amz-navy); padding: 12px 15px; color: white; position: sticky; top: 0; z-index: 1000; }
        .header-main { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 22px; font-weight: 800; cursor: pointer; }
        .logo span { color: var(--amz-yellow); }

        /* PAGES */
        .page { display: none; padding: 10px; animation: fadeIn 0.3s; }
        .active-page { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* PRODUCT DETAIL STYLES */
        .detail-card { background: white; padding: 15px; border-radius: 8px; }
        .detail-img { width: 100%; max-height: 300px; object-fit: contain; }
        .color-option { display: inline-block; width: 30px; height: 30px; border-radius: 50%; margin: 10px 5px; cursor: pointer; border: 2px solid #ddd; }
        .color-option.selected { border: 2px solid var(--amz-orange); transform: scale(1.1); }
        
        .trust-badges { display: flex; justify-content: space-between; margin: 20px 0; font-size: 11px; text-align: center; color: #007185; }
        .badge-item { flex: 1; }

        /* BUTTONS */
        .amz-btn { background: #FFD814; border: 1px solid #FCD200; border-radius: 20px; padding: 12px; width: 100%; font-weight: 600; cursor: pointer; margin-top: 10px; }
        .amz-btn-orange { background: #FFA41C; border: 1px solid #FF8F00; }

        /* FORM */
        .form-group { margin-bottom: 15px; }
        input { width: 100%; padding: 12px; border: 1px solid #888; border-radius: 5px; box-sizing: border-box; }

        /* CONFIRMATION ANIMATION */
        .success-tick { font-size: 80px; color: #4CAF50; margin-top: 50px; }

        /* BOTTOM NAV */
        nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #ddd; }
        .nav-item { flex: 1; text-align: center; padding: 10px 0; font-size: 11px; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <div class="header-main">
        <div class="logo" onclick="showPage('home-page')">VARUN<span>STORE</span></div>
        <div onclick="showPage('cart-page')">🛒<span id="cart-count">0</span></div>
    </div>
</header>

<!-- HOME PAGE -->
<div id="home-page" class="page active-page">
    <div id="product-list" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;"></div>
</div>

<!-- DETAIL PAGE -->
<div id="detail-page" class="page">
    <div id="detail-content" class="detail-card"></div>
</div>

<!-- ADDRESS PAGE -->
<div id="address-page" class="page">
    <div class="detail-card">
        <h2>Delivery Address</h2>
        <div class="form-group"><input type="text" id="u-name" placeholder="Full Name"></div>
        <div class="form-group"><input type="number" id="u-phone" placeholder="Phone Number (10 digits)"></div>
        <div class="form-group"><input type="text" id="u-address" placeholder="Flat / Area / Landmark"></div>
        <div class="form-group"><input type="number" id="u-pin" placeholder="Pin Code (6 digits)"></div>
        <button class="amz-btn amz-btn-orange" onclick="validateAddress()">Make Payment</button>
    </div>
</div>

<!-- PAYMENT PAGE -->
<div id="payment-page" class="page">
    <div class="detail-card" style="text-align:center;">
        <h2>Scan & Pay</h2>
        <div id="qr-display" style="margin:20px 0;"></div>
        <p>UPI ID: <b>varungoyal7910@pnb</b></p>
        <button class="amz-btn" style="width:auto; padding:5px 15px;" onclick="copyUPI()">Copy UPI ID</button>
        <hr>
        <input type="text" id="u-utr" placeholder="Enter Transaction Reference ID" style="margin-top:10px;">
        <button class="amz-btn amz-btn-orange" onclick="confirmOrder()">Confirm Order</button>
    </div>
</div>

<!-- SUCCESS PAGE -->
<div id="success-page" class="page" style="text-align:center; padding-top:50px;">
    <div class="success-tick">✔️</div>
    <h2>Order Confirmed!</h2>
    <p>Aapka order humare pass pahunch gaya hai.</p>
    <p><b>30 minutes</b> mein hum ise process karenge.</p>
    <button class="amz-btn" onclick="showPage('home-page')">Continue Shopping</button>
</div>

<nav>
    <div class="nav-item" onclick="showPage('home-page')">🏠<br>Home</div>
    <div class="nav-item" onclick="showPage('orders-page')">📦<br>Orders</div>
    <div class="nav-item" onclick="showPage('help-page')">🆘<br>Help</div>
</nav>

<script>
    const products = [
        { id: 1, name: "Vlogging Mic Pro", price: 99, mrp: 499, img: "https://m.media-amazon.com/images/I/71Xmbe9Vp1L._SL1500_.jpg", desc: "Premium sound quality with noise cancellation. Best for YouTube videos." },
        { id: 2, name: "Smart Tripod Stand", price: 149, mrp: 699, img: "https://m.media-amazon.com/images/I/61Swn6S7unL._SL1500_.jpg", desc: "360 degree rotation with adjustable height." }
    ];

    let cart = {};
    let selectedColor = "Black";

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.getElementById(id).classList.add('active-page');
        window.scrollTo(0,0);
    }

    function renderHome() {
        document.getElementById('product-list').innerHTML = products.map(p => `
            <div style="background:white; padding:10px; border-radius:8px;" onclick="viewProduct(${p.id})">
                <img src="${p.img}" style="width:100%; height:120px; object-fit:contain;">
                <p style="font-size:13px; height:35px; overflow:hidden;">${p.name}</p>
                <b>₹${p.price}</b>
            </div>
        `).join('');
    }

    function viewProduct(id) {
        const p = products.find(x => x.id === id);
        const discount = Math.round(((p.mrp - p.price) / p.mrp) * 100);
        document.getElementById('detail-content').innerHTML = `
            <img src="${p.img}" class="detail-img">
            <h2>${p.name}</h2>
            <p><span style="color:#CC0C39; font-size:24px;">-${discount}%</span> <span style="font-size:24px; font-weight:bold; margin-left:10px;">₹${p.price}</span></p>
            <p>M.R.P: <span style="text-decoration:line-through;">₹${p.mrp}</span></p>
            <p><b>Description:</b><br>${p.desc}</p>
            <div style="margin:15px 0;">
                <b>Select Color:</b><br>
                <div class="color-option" style="background:black;" onclick="selColor(this,'Black')"></div>
                <div class="color-option" style="background:red;" onclick="selColor(this,'Red')"></div>
                <div class="color-option" style="background:blue;" onclick="selColor(this,'Blue')"></div>
                <div class="color-option" style="background:silver;" onclick="selColor(this,'Silver')"></div>
            </div>
            <div class="trust-badges">
                <div class="badge-item">🔄<br>7 Days Replacement</div>
                <div class="badge-item">🚚<br>All India Free Delivery</div>
                <div class="badge-item">⭐<br>Guaranteed Product</div>
            </div>
            <button class="amz-btn" onclick="addToCart(${p.id})">Add to Cart</button>
            <button class="amz-btn amz-btn-orange" onclick="buyNow(${p.id})">Buy Now</button>
        `;
        showPage('detail-page');
    }

    function selColor(el, color) {
        document.querySelectorAll('.color-option').forEach(c => c.classList.remove('selected'));
        el.classList.add('selected');
        selectedColor = color;
    }

    function buyNow(id) {
        cart = { [id]: { ...products.find(x => x.id === id), qty: 1 } };
        showPage('address-page');
    }

    function validateAddress() {
        const phone = document.getElementById('u-phone').value;
        const pin = document.getElementById('u-pin').value;
        if(phone.length !== 10) return alert("Please enter a 10-digit phone number");
        if(pin.length !== 6) return alert("Please enter a 6-digit pin code");
        
        const total = Object.values(cart)[0].price;
        const upiLink = `upi://pay?pa=varungoyal7910@pnb&pn=VarunStore&am=${total}&cu=INR`;
        document.getElementById('qr-display').innerHTML = `<img src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${encodeURIComponent(upiLink)}">`;
        showPage('payment-page');
    }

    function copyUPI() {
        navigator.clipboard.writeText("varungoyal7910@pnb");
        alert("UPI ID Copied!");
    }

    function confirmOrder() {
        const utr = document.getElementById('u-utr').value;
        if(!utr) return alert("Please enter Transaction Reference ID");

        // Play Sound
        const audio = new Audio('https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3');
        audio.play();

        showPage('success-page');
    }

    renderHome();
</script>
</body>
</html>
