<script>
    let cart = [];
    let myOrders = JSON.parse(localStorage.getItem('gocart_orders')) || [];
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxpq0xom4H-qEydf6-vI6x_oZGXhvMikC6u2rcPI-TA2qbdym0UKsiItv5geb-2aR9R/exec';

    // 1. Order ID Generator
    function generateOrderID() {
        return 'GC' + Math.floor(100000 + Math.random() * 900000);
    }

    // 2. Confirm Order with Processing Screen
    async function confirmOrder() {
        const ref = document.getElementById('pay-ref').value;
        if(!ref) return alert("Please enter payment reference!");

        const orderId = generateOrderID();
        const now = new Date();
        
        // Processing Screen Show
        document.body.innerHTML = `
            <div style="height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; background:#fff;">
                <div class="loader"></div> <!-- Add CSS for loader -->
                <h2 style="color:#FF6600;">Processing Please Wait...</h2>
                <p>Generating Order ID: ${orderId}</p>
            </div>
        `;

        const orderData = {
            name: document.getElementById('u-name').value,
            phone: document.getElementById('u-phone').value,
            address: document.getElementById('u-address').value,
            pincode: document.getElementById('u-pin').value,
            utr: ref,
            price: document.getElementById('cart-total').innerText,
            dateTime: now.toLocaleString(),
            orderId: orderId,
            status: "Pending", // Default Status
            items: cart.map(i => `${i.name} (${i.color || 'No Color'})`).join(', ')
        };

        try {
            // Google Sheets Connection
            await fetch(scriptURL, { method: 'POST', body: JSON.stringify(orderData) });
            
            // Save to My Orders (Local Storage)
            myOrders.push(orderData);
            localStorage.setItem('gocart_orders', JSON.stringify(myOrders));

            // Success Screen
            setTimeout(() => {
                location.reload(); // App reload to Home
                alert("Order Placed! ID: " + orderId);
            }, 2000);

        } catch (err) {
            alert("Connection Error! Sheet check karein.");
            location.reload();
        }
    }

    // 3. My Orders Section (Working)
    function showMyOrders() {
        const list = document.getElementById('orders-display-area'); // Add this div in your My Orders page
        if(myOrders.length === 0) {
            list.innerHTML = "<p>Koi order nahi mila.</p>";
        } else {
            list.innerHTML = myOrders.map(o => `
                <div style="background:white; padding:15px; border-radius:10px; margin-bottom:10px; border-left:5px solid #FF6600;">
                    <div style="display:flex; justify-content:space-between;">
                        <b>ID: ${o.orderId}</b>
                        <span style="color:orange;">${o.status}</span>
                    </div>
                    <small>${o.dateTime}</small><br>
                    <span>${o.items}</span><br>
                    <b>Total: ₹${o.price}</b>
                    <div id="replace-section-${o.orderId}" style="display:none; margin-top:10px;">
                         <button class="action-btn" style="background:#444; padding:5px;">Replacement Request</button>
                    </div>
                </div>
            `).join('');
        }
        showPage('my-orders-page');
    }

    // 4. Replacement Button Control (Jab aap command doge)
    function enableReplacement(orderId) {
        const btn = document.getElementById(`replace-section-${orderId}`);
        if(btn) btn.style.display = 'block';
    }
</script>
