<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Varun Store | Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --card: #111; --accent: #fff; --sub: #888; --green: #34c759; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; background: var(--bg); color: #fff; -webkit-font-smoothing: antialiased; }
        
        header { background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); padding: 20px; position: sticky; top: 0; z-index: 1000; text-align: center; border-bottom: 1px solid #222; }
        .logo { font-size: 20px; font-weight: 800; letter-spacing: 3px; text-transform: uppercase; }

        .container { padding: 20px; padding-bottom: 120px; max-width: 500px; margin: auto; }
        
        /* Product Design */
        .product-card { background: var(--card); border-radius: 25px; padding: 12px; margin-bottom: 20px; border: 1px solid #222; }
        .product-card img { width: 100%; border-radius: 20px; height: 320px; object-fit: cover; }
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .btn-cart { flex: 1; padding: 15px; border-radius: 15px; background: #222; color: #fff; border: 1px solid #333; font-weight: 600; cursor: pointer; }
        .btn-buy { flex: 1; padding: 15px; border-radius: 15px; background: #fff; color: #000; border: none; font-weight: 800; cursor: pointer; }

        /* Overlays (Cart/Tracking/Checkout) */
        .overlay { position: fixed; inset: 0; background: #000; z-index: 4000; display: none; flex-direction: column; padding: 25px; overflow-y: auto; }
        .close-icon { font-size: 30px; margin-bottom: 20px; cursor: pointer; align-self: flex-end; }

        input, textarea { width: 100%; background: #111; border: 1px solid #222; padding: 18px; border-radius: 15px; margin-bottom: 15px; color: #fff; font-size: 15px; box-sizing: border-box; outline: none; }
        
        .upi-box { background: #111; border: 2px dashed #333; padding: 20px; border-radius: 20px; text-align: center; margin: 20px 0; }
        .upi-id { font-size: 18px; font-weight: 800; color: var(--green); letter-spacing: 1px; }

        .status-card { background: #111; border: 1px solid #222; padding: 20px; border-radius: 20px; margin-top: 20px; text-align: left; }

        /* Navigation */
        nav { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 85%; background: rgba(255,255,255,0.1); backdrop-filter: blur(25px); border-radius: 40px; display: flex; justify-content: space-around; padding: 15px; z-index: 2000; border: 1px solid rgba(255,255,255,0.1); }
        .nav-item { color: white; text-align: center; font-size: 10px; cursor: pointer; opacity: 0.6; position: relative; }
        .badge { position: absolute; top: -8px; right: -5px; background: #fff; color: #000; font-size: 10px; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; }
    </style>
</head>
<body>

<header><div class="logo">VARUN<span>STORE</span></div></header>

<div class="container" id="main-list"></div>

<!-- Single Modal for everything -->
<div id="modal" class="overlay"></div>

<nav>
    <div class="nav-item" onclick="location.reload()">HOME</div>
    <div class="nav-item" onclick="openCart()">CART <span id="cart-count" class="badge">0</span></div>
    <div class="nav-item" onclick="openJ1()">TRACK</div>
</nav>

<script>
    // 1. APNA NAYA URL YAHAN DALO
    const scriptURL = "https://script.google.com/macros/s/AKfycbwFuATW-egCFrwciXjexSyggNxzEWcdVgbxp3MMVuCHnuELc36oedJPxxHlYfbZKTQ1/exec"; 
    
    let cart = [];

    // 2. PRODUCTS LIST
    const products = [
        { id: 1, name: "Premium Silicone Case", price: 95, mrp: 499, img: "https://images.unsplash.com/photo-1544117518-2b041580c79d?w=500" },
        { id: 2, name: "Super Fast Adapter", price: 145, mrp: 699, img: "https://images.unsplash.com/photo-1625517407003-89c16bc18a5e?w=500" }
    ];

    function renderHome() {
        let html = '';
        products.forEach(p => {
            html += `
                <div class="product-card">
                    <img src="${p.img}">
                    <div style="padding:15px 5px;">
                        <h3>${p.name}</h3>
                        <div style="margin-bottom:15px;">
                            <span style="font-size:22px; font-weight:800;">₹${p.price}</span>
                            <span style="color:#555; text-decoration:line-through; margin-left:10px;">₹${p.mrp}</span>
                        </div>
                        <div class="btn-group">
                            <button class="btn-cart" onclick="addToCart(${p.id})">Add to Cart</button>
                            <button class="btn-buy" onclick="quickBuy(${p.id})">Buy Now</button>
                        </div>
                    </div>
                </div>`;
        });
        document.getElementById('main-list').innerHTML = html;
    }

    // CART LOGIC
    function addToCart(id) {
        cart.push(products.find(x => x.id === id));
        document.getElementById('cart-count').innerText = cart.length;
    }

    function quickBuy(id) {
        cart = [products.find(x => x.id === id)];
        openCheckout();
    }

    function openCart() {
        if(cart.length === 0) return alert("Cart khali hai bhai!");
        openCheckout();
    }

    // CHECKOUT PAGE
    function openCheckout() {
        const modal = document.getElementById('modal');
        modal.style.display = 'flex';
        let total = cart.reduce((s, i) => s + i.price, 0);
        modal.innerHTML = `
            <div class="close-icon" onclick="closeModal()">✕</div>
            <h2>Order Details</h2>
            <p style="color:var(--sub); margin-bottom:20px;">Items: ${cart.map(i => i.name).join(', ')}</p>
            
            <input type="text" id="v-name" placeholder="Full Name">
            <input type="tel" id="v-phone" placeholder="Phone Number" maxlength="10">
            <textarea id="v-addr" placeholder="Full Address (House, Street, Area)" rows="3"></textarea>
            <input type="number" id="v-pin" placeholder="Pincode (6 Digits)" maxlength="6">
            
            <div class="upi-box">
                <p style="font-size:12px; color:var(--sub); margin-bottom:5px;">Transfer ₹${total} to UPI:</p>
                <div class="upi-id">varungoyal7910@pnb</div>
                <p style="font-size:10px; color:#555; margin-top:10px;">Payment karke niche details bharein</p>
            </div>
            
            <input type="text" id="v-pay-ref" placeholder="Payment Phone No. / Ref ID" required>
            <button class="btn-buy" style="width:100%; padding:20px;" onclick="placeOrder(${total})">Place Order Now</button>
        `;
    }

    // J1 TRACKING SYSTEM
    function openJ1() {
        const modal = document.getElementById('modal');
        modal.style.display = 'flex';
        modal.innerHTML = `
            <div class="close-icon" onclick="closeModal()">✕</div>
            <h1>Track Order</h1>
            <p style="color:var(--sub); margin-bottom:25px;">Enter your Order ID below</p>
            <input type="text" id="track-id" placeholder="VARXXXX" style="text-align:center; letter-spacing:2px; font-weight:800;">
            <button class="btn-buy" style="width:100%; padding:20px;" onclick="fetchStatus()">Check Status</button>
            <div id="track-result"></div>
        `;
    }

    async function fetchStatus() {
        const id = document.getElementById('track-id').value.trim();
        const resDiv = document.getElementById('track-result');
        if(!id) return alert("ID toh dalo!");
        
        resDiv.innerHTML = "<p style='text-align:center; margin-top:20px; color:var(--sub);'>Searching...</p>";
        
        try {
            const res = await fetch(`${scriptURL}?orderID=${id}`);
            const status = await res.text();
            resDiv.innerHTML = `
                <div class="status-card">
                    <div style="color:var(--sub); font-size:11px; margin-bottom:10px;">ORDER ID: ${id}</div>
                    <div style="font-size:20px; font-weight:800; color:var(--green);">● ${status}</div>
                </div>`;
        } catch(e) {
            resDiv.innerHTML = "<p style='color:red; text-align:center; margin-top:10px;'>ID nahi mili!</p>";
        }
    }

    // PLACE ORDER TO SHEET
    async function placeOrder(total) {
        const name = document.getElementById('v-name').value;
        const phone = document.getElementById('v-phone').value;
        const addr = document.getElementById('v-addr').value;
        const pin = document.getElementById('v-pin').value;
        const payRef = document.getElementById('v-pay-ref').value;

        if(!name || !phone || !payRef) return alert("Bhai, Details aur Payment Number zaruri hai!");

        const orderID = "VAR" + Math.floor(1000 + Math.random()*9000);
        const data = { name, phone, address: addr, pincode: pin, payRef, total, orderID };

        // Data bhej rahe hain
        fetch(scriptURL, { method: "POST", body: JSON.stringify(data) });

        // Show Success Screen
        const modal = document.getElementById('modal');
        modal.innerHTML = `
            <div style="text-align:center; padding-top:60px;">
                <div style="font-size:60px; color:var(--green); margin-bottom:20px;">✔</div>
                <h1 style="margin-bottom:10px;">Order Placed!</h1>
                <p style="color:var(--sub);">Order ID: <b style="color:#fff;">${orderID}</b></p>
                <p style="font-size:12px; color:#555; margin-top:20px; padding:0 20px;">Is ID ko save kar lo, baad mein track karne ke kaam aayegi.</p>
                <button class="btn-buy" style="margin-top:40px; width:80%;" onclick="location.reload()">Back to Shop</button>
            </div>
        `;
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    renderHome();
</script>
</body>
</html>
