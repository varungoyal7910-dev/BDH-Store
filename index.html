<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Varun Store | Vlogging Hub</title>
    <style>
        :root { --accent: #e91e63; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); padding-bottom: 80px; }
        header { background: #fff; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 20px; font-weight: bold; color: var(--accent); }
        
        /* Navigation */
        nav { position: fixed; bottom: 0; width: 100%; background: #fff; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #ddd; z-index: 1000; }
        .nav-item { text-align: center; font-size: 10px; color: #888; cursor: pointer; flex: 1; }
        .nav-item.active { color: var(--accent); font-weight: bold; }

        /* Pages */
        .page { display: none; padding: 15px; animation: fadeIn 0.3s; }
        .active-page { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* UI Cards */
        .p-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .p-card { background: #fff; border-radius: 10px; overflow: hidden; border: 1px solid #eee; text-align: center; cursor: pointer; }
        .p-img { width: 100%; height: 140px; object-fit: cover; }
        .cart-item { display: flex; justify-content: space-between; background: #fff; padding: 15px; margin-bottom: 8px; border-radius: 8px; align-items: center; }
        
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn { background: var(--accent); color: #fff; border: none; padding: 15px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        #payment-modal { display:none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:2000; justify-content:center; align-items:center; color:#fff; text-align:center; }
    </style>
</head>
<body>

<header>
    <div class="logo">VARUN STORE</div>
    <div onclick="showPage('cart-page')" style="cursor:pointer">🛒 <span id="cart-count">0</span></div>
</header>

<!-- HOME -->
<div id="home-page" class="page active-page">
    <div class="p-grid" id="product-list"></div>
</div>

<!-- CART -->
<div id="cart-page" class="page">
    <h2>My Shopping Cart</h2>
    <div id="cart-items-list"></div>
    <div id="cart-total-area"></div>
</div>

<!-- CHECKOUT -->
<div id="checkout-page" class="page">
    <h2>Delivery Address</h2>
    <input type="text" id="u-name" placeholder="Full Name">
    <input type="number" id="u-phone" placeholder="Mobile Number">
    <textarea id="u-address" rows="3" placeholder="Full Home Address"></textarea>
    <input type="number" id="u-pin" placeholder="Pincode">
    <button class="btn" onclick="openPayment()">Proceed to Payment</button>
</div>

<!-- PAYMENT MODAL -->
<div id="payment-modal">
    <div style="background:#fff; color:#000; padding:20px; border-radius:15px; width:85%;">
        <h3>Pay with UPI</h3>
        <!-- Google Pay / PhonePe QR Style -->
        <div id="qr-container" style="margin:15px 0;"></div>
        <p><b>varungoyal7910@pnb</b></p>
        <p>Total: <span id="pay-amt" style="color:red; font-weight:bold;"></span></p>
        <input type="text" id="u-utr" placeholder="Enter 12-digit UTR Number">
        <button class="btn" onclick="submitOrder()">Submit Payment</button>
        <button onclick="document.getElementById('payment-modal').style.display='none'" style="border:none; background:none; color:grey; margin-top:10px;">Cancel</button>
    </div>
</div>

<!-- ORDERS -->
<div id="orders-page" class="page">
    <h2>Order History</h2>
    <div id="history-list"></div>
</div>

<nav>
    <div class="nav-item active" id="n-home" onclick="showPage('home-page')">🏠<br>Home</div>
    <div class="nav-item" id="n-orders" onclick="showPage('orders-page')">📦<br>Orders</div>
    <div class="nav-item" id="n-help" onclick="location.href='mailto:varungoyal7910@gmail.com'">🆘<br>Help</div>
</nav>

<script>
    // 1. APNA SCRIPT URL YAHAN DALO
    const scriptURL = "https://script.google.com/macros/s/AKfycbxfoHDe7kKojTS6b_u0fkG_rrgliVXSDBeQnltEo5Xi8QNL7QDopaGNSGPSFn5neujG/exec";

    const products = [
        { id: 101, name: "Vlogging Mic", price: 298, img: "https://images.unsplash.com/photo-1590658268037-6bf12165a8df?w=400" },
        { id: 102, name: "Vlog Tripod", price: 149, img: "https://images.unsplash.com/photo-1516035069371-29a1b244cc32?w=400" }
    ];

    let cart = {};

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.getElementById(id).classList.add('active-page');
        if(id === 'cart-page') renderCart();
        if(id === 'orders-page') renderHistory();
    }

    function init() {
        document.getElementById('product-list').innerHTML = products.map(p => `
            <div class="p-card" onclick="addToCart(${p.id})">
                <img src="${p.img}" class="p-img">
                <div style="padding:10px"><b>${p.name}</b><br>₹${p.price}</div>
            </div>`).join('');
    }

    function addToCart(id) {
        if(cart[id]) cart[id].qty++;
        else cart[id] = { ...products.find(p => p.id === id), qty: 1 };
        updateCount();
    }

    function updateCount() {
        document.getElementById('cart-count').innerText = Object.values(cart).reduce((a,b) => a + b.qty, 0);
    }

    function renderCart() {
        const list = document.getElementById('cart-items-list');
        const items = Object.values(cart);
        if(items.length === 0) { list.innerHTML = "Cart is empty."; return; }

        list.innerHTML = items.map(i => `
            <div class="cart-item">
                <span><b>${i.name}</b><br>₹${i.price * i.qty}</span>
                <div>
                    <button onclick="changeQty(${i.id},-1)">-</button>
                    <span>${i.qty}</span>
                    <button onclick="changeQty(${i.id},1)">+</button>
                </div>
            </div>`).join('');

        let total = items.reduce((a,b) => a + (b.price * b.qty), 0);
        document.getElementById('cart-total-area').innerHTML = `<h3>Total: ₹${total}</h3><button class="btn" onclick="showPage('checkout-page')">Checkout</button>`;
    }

    function changeQty(id, val) {
        cart[id].qty += val;
        if(cart[id].qty <= 0) delete cart[id];
        renderCart(); updateCount();
    }

    function openPayment() {
        const total = Object.values(cart).reduce((a,b) => a + (b.price * b.qty), 0);
        document.getElementById('pay-amt').innerText = "₹" + total;
        // Generate QR Code dynamically
        const upiLink = `upi://pay?pa=varungoyal7910@pnb&pn=VarunStore&am=${total}&cu=INR`;
        document.getElementById('qr-container').innerHTML = `<img src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${encodeURIComponent(upiLink)}" />`;
        document.getElementById('payment-modal').style.display = 'flex';
    }

    async function submitOrder() {
        const utr = document.getElementById('u-utr').value;
        if(!utr || utr.length < 10) return alert("Sahi UTR Number dalo!");

        const orderData = {
            orderID: "VAR" + Date.now().toString().slice(-4),
            name: document.getElementById('u-name').value,
            phone: document.getElementById('u-phone').value,
            address: document.getElementById('u-address').value,
            pin: document.getElementById('u-pin').value,
            total: document.getElementById('pay-amt').innerText,
            utr: utr,
            date: new Date().toLocaleDateString()
        };

        // Send to Sheets
        fetch(scriptURL, { method: 'POST', body: JSON.stringify(orderData) });

        // Save locally
        let hist = JSON.parse(localStorage.getItem('myOrders')) || [];
        hist.push(orderData);
        localStorage.setItem('myOrders', JSON.stringify(hist));

        alert("Order Successful! ID: " + orderData.orderID);
        cart = {}; updateCount();
        document.getElementById('payment-modal').style.display = 'none';
        showPage('orders-page');
    }

    function renderHistory() {
        const hist = JSON.parse(localStorage.getItem('myOrders')) || [];
        document.getElementById('history-list').innerHTML = hist.reverse().map(o => `
            <div style="background:#fff; padding:15px; margin-bottom:10px; border-radius:10px; border-left:5px solid var(--accent)">
                <b>ID: ${o.orderID}</b> | ₹${o.total}<br>Status: <span style="color:orange">Processing</span>
            </div>`).join('');
    }

    init();
</script>
</body>
</html>
