<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Varun Store | Premium</title>
    <style>
        :root { --primary: #0f172a; --accent: #3b82f6; --bg: #f8fafc; --text: #1e293b; --fam: #ffdb00; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg); color: var(--text); -webkit-tap-highlight-color: transparent; }
        
        /* Premium Header & Filters */
        header { background: var(--primary); color: white; padding: 20px 15px 15px; position: sticky; top: 0; z-index: 1000; border-radius: 0 0 24px 24px; }
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .logo { font-size: 20px; font-weight: 900; letter-spacing: -1px; }
        
        .filter-scroll { display: flex; gap: 10px; overflow-x: auto; scrollbar-width: none; padding-bottom: 5px; }
        .filter-chip { background: rgba(255,255,255,0.1); color: white; padding: 8px 16px; border-radius: 100px; font-size: 11px; font-weight: 700; white-space: nowrap; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); }
        .filter-chip.active { background: white; color: var(--primary); }

        /* Product Grid */
        .container { padding: 15px 15px 120px; }
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .card { background: white; border-radius: 18px; padding: 10px; border: 1px solid #f1f5f9; cursor: pointer; }
        .card img { width: 100%; height: 130px; object-fit: cover; border-radius: 14px; }
        .card-title { font-size: 12px; font-weight: 600; margin: 8px 0 4px; color: #64748b; }
        .card-price { color: var(--primary); font-weight: 900; font-size: 15px; }

        /* Cart Management Styles */
        .cart-item { background: white; padding: 12px; border-radius: 16px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .qty-controls { display: flex; align-items: center; gap: 8px; background: #f1f5f9; padding: 4px 10px; border-radius: 50px; }
        .qty-btn { border: none; background: none; font-weight: bold; cursor: pointer; padding: 2px 8px; }

        /* Professional Modal */
        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; z-index: 2000; backdrop-filter: blur(5px); }
        #modal { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-radius: 24px 24px 0 0; padding: 25px; display: none; z-index: 2001; transition: 0.3s ease-out; }
        .pay-box { border: 1px solid #e2e8f0; padding: 15px; border-radius: 16px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; }
        .copy-btn { background: var(--accent); color: white; border: none; padding: 6px 12px; border-radius: 8px; font-size: 11px; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div class="header-top">
        <div class="logo">VARUN STORE</div>
        <div onclick="showTab('cart')" style="cursor:pointer; background:rgba(255,255,255,0.1); padding:8px 12px; border-radius:12px;">🛒 <span id="count">0</span></div>
    </div>
    <div class="filter-scroll">
        <div class="filter-chip active" onclick="filterByPrice(9999, this)">All</div>
        <div class="filter-chip" onclick="filterByPrice(99, this)">Under ₹99</div>
        <div class="filter-chip" onclick="filterByPrice(149, this)">Under ₹149</div>
        <div class="filter-chip" onclick="filterByPrice(199, this)">Under ₹199</div>
    </div>
</header>

<div class="container" id="mainView">
    <div class="product-grid" id="productDisplay"></div>
</div>

<div id="overlay"></div>
<div id="modal"></div>

<script>
    let cart = [];
    let currentFilter = 9999;
    const products = [
        { id: 1, name: "Premium Case", price: 95, img: "https://images.unsplash.com/photo-1544117518-2b041580c79d?w=200" },
        { id: 2, name: "Fast Cable", price: 120, img: "https://images.unsplash.com/photo-1625517407003-89c16bc18a5e?w=200" },
        { id: 3, name: "Grip Stand", price: 180, img: "https://images.unsplash.com/photo-1616348436168-de43ad0db179?w=200" }
    ];

    function renderProducts() {
        const filtered = products.filter(p => p.price <= currentFilter);
        document.getElementById('productDisplay').innerHTML = filtered.map(p => `
            <div class="card" onclick="addToCart(${p.id})">
                <img src="${p.img}">
                <div class="card-title">${p.name}</div>
                <div class="card-price">₹${p.price}</div>
                <button style="width:100%; margin-top:8px; border:none; background:#f1f5f9; border-radius:8px; padding:5px; font-size:10px; font-weight:bold;">+ ADD</button>
            </div>
        `).join('');
    }

    function filterByPrice(max, el) {
        document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        currentFilter = max;
        renderProducts();
    }

    function addToCart(id) {
        let p = products.find(x => x.id === id);
        let existing = cart.find(i => i.id === id);
        if(existing) existing.qty++; else cart.push({...p, qty: 1});
        updateBadge();
    }

    function updateBadge() { document.getElementById('count').innerText = cart.reduce((s, i) => s + i.qty, 0); }

    function showTab(tab) {
        let v = document.getElementById('mainView');
        if(tab === 'cart') {
            let total = cart.reduce((s, i) => s + (i.price * i.qty), 0);
            if(cart.length === 0) return v.innerHTML = "<div style='text-align:center; padding:100px 0;'>Bag Khali Hai! 🛍️</div>";
            v.innerHTML = `
                <h3>Shopping Bag</h3>
                ${cart.map((item, idx) => `
                    <div class="cart-item">
                        <div><b>${item.name}</b><br><small>₹${item.price}</small></div>
                        <div class="qty-controls">
                            <button class="qty-btn" onclick="changeQty(${idx}, -1)">−</button>
                            <span>${item.qty}</span>
                            <button class="qty-btn" onclick="changeQty(${idx}, 1)">+</button>
                        </div>
                    </div>
                `).join('')}
                <div style="background:var(--primary); color:white; padding:20px; border-radius:20px; margin-top:20px;">
                    <div style="display:flex; justify-content:space-between; margin-bottom:15px;"><span>Total</span><b>₹${total}</b></div>
                    <input type="text" id="cn" placeholder="Aapka Naam" style="width:100%; padding:12px; margin-bottom:10px; border-radius:10px; border:none;">
                    <textarea id="ca" placeholder="Pura Address" style="width:100%; padding:12px; border-radius:10px; border:none; height:60px;"></textarea>
                    <button onclick="checkout(${total})" style="width:100%; padding:15px; background:var(--accent); color:white; border:none; border-radius:12px; font-weight:bold; margin-top:15px;">ORDER NOW</button>
                </div>
            `;
        }
    }

    function changeQty(idx, d) {
        cart[idx].qty += d;
        if(cart[idx].qty < 1) cart.splice(idx, 1);
        updateBadge(); showTab('cart');
    }

    function checkout(total) {
        const n = document.getElementById('cn').value;
        const a = document.getElementById('ca').value;
        if(!n || !a) return alert("Puri details bharo!");

        let oid = "#VAR-" + Math.floor(1000 + Math.random() * 9000);
        document.getElementById('overlay').style.display = 'block';
        document.getElementById('modal').style.display = 'block';
        
        // NO RISK ALERT UI
        document.getElementById('modal').innerHTML = `
            <div style="width:40px; height:40px; background:var(--fam); border-radius:50%; display:inline-flex; align-items:center; justify-content:center; margin-bottom:15px;">⚡</div>
            <h3 style="margin:0;">Payment Verify Karein</h3>
            <p style="font-size:12px; color:#666; margin-bottom:20px;">Risk Alert se bachne ke liye ID copy karein aur kisi bhi app se pay karein.</p>
            
            <div class="pay-box">
                <div style="text-align:left;">
                    <small style="color:#999; font-size:9px;">UPI ID</small>
                    <div style="font-weight:bold; font-size:14px;">9464961098@fam</div>
                </div>
                <button class="copy-btn" onclick="copyUPI()">COPY ID</button>
            </div>

            <div class="pay-box">
                <div style="text-align:left;">
                    <small style="color:#999; font-size:9px;">AMOUNT</small>
                    <div style="font-weight:bold; font-size:14px;">₹${total}</div>
                </div>
            </div>

            <button onclick="window.location.href='upi://pay?pa=9464961098@fam&am=${total}'" style="width:100%; padding:15px; background:var(--primary); color:white; border:none; border-radius:12px; font-weight:bold; margin-top:10px;">DIRECT PAY (Try First)</button>
            
            <p style="font-size:10px; color:#999; margin-top:15px;">Pay karne ke baad screenshot <b>Varun</b> ko bhej dein.</p>
            <button onclick="location.reload()" style="background:none; border:none; color:var(--accent); font-size:12px; margin-top:10px;">Back to Store</button>
        `;
    }

    function copyUPI() {
        navigator.clipboard.writeText("9464961098@fam");
        alert("UPI ID Copy Ho Gayi! Ab kisi bhi App mein paste karke pay karein.");
    }

    renderProducts();
</script>
</body>
</html>
