<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOCART PRO - Ultimate Edition</title>
    <style>
        :root { --navy: #1a1a2e; --primary: #16213e; --accent: #0f3460; --white: #ffffff; --amazon-red: #cc0c39; --green: #2ecc71; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background: #f0f2f5; color: var(--navy); padding-bottom: 80px; }
        
        /* Header with Cart Corner */
        header { background: var(--navy); color: white; padding: 20px; position: sticky; top: 0; z-index: 1000; display: flex; justify-content: space-between; align-items: center; border-radius: 0 0 20px 20px; }
        .logo { font-size: 22px; font-weight: 900; letter-spacing: -1px; }
        .cart-icon-top { position: relative; font-size: 24px; cursor: pointer; background: rgba(255,255,255,0.1); padding: 8px; border-radius: 12px; }
        #bag-badge { position: absolute; top: -5px; right: -5px; background: var(--amazon-red); color: white; font-size: 10px; padding: 3px 6px; border-radius: 50%; font-weight: bold; }

        .container { padding: 20px; }
        .search-bar { width: 100%; padding: 15px; border-radius: 15px; border: none; outline: none; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); font-size: 16px; }

        /* Product Cards */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { background: white; border-radius: 20px; padding: 15px; position: relative; transition: 0.3s; box-shadow: 0 5px 15px rgba(0,0,0,0.02); }
        .card:active { transform: scale(0.95); }
        .card img { width: 100%; height: 130px; object-fit: contain; }
        .p-off-pill { position: absolute; top: 10px; left: 10px; background: var(--amazon-red); color: white; padding: 4px 8px; border-radius: 8px; font-size: 10px; font-weight: 900; }
        .card-info { margin-top: 10px; }
        .card-title { font-size: 14px; font-weight: 700; height: 38px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }

        /* Page Layouts */
        .page { display: none; min-height: 100vh; animation: fadeIn 0.3s; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Bottom Nav */
        nav { background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; padding: 12px; border-top: 1px solid #eee; z-index: 1000; }
        .nav-item { border: none; background: none; color: #bbb; font-size: 11px; text-align: center; font-weight: 700; flex: 1; transition: 0.3s; }
        .nav-item.active { color: var(--navy); transform: translateY(-5px); }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 4px; }

        /* Utility Classes */
        .btn-action { width: 100%; background: var(--navy); color: white; padding: 18px; border: none; border-radius: 15px; font-weight: 700; font-size: 16px; cursor: pointer; }
        .form-input { width: 100%; padding: 15px; margin-bottom: 15px; border: 1px solid #eee; border-radius: 12px; background: white; font-size: 14px; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid var(--navy); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Order Item Style */
        .order-card { background: white; padding: 15px; border-radius: 15px; margin-bottom: 10px; border-left: 5px solid var(--navy); }
    </style>
</head>
<body>

    <header>
        <div class="logo">GOCART PRO</div>
        <div class="cart-icon-top" onclick="showPage('checkout-page')">
            🛒 <span id="bag-badge">0</span>
        </div>
    </header>

    <div class="container">
        <!-- Home Page -->
        <div id="home" class="page active">
            <input type="text" class="search-bar" placeholder="Search gadgets, lights..." oninput="filter()">
            <div class="grid" id="main-grid"></div>
        </div>

        <!-- Detail Page -->
        <div id="details-page" class="page">
            <div id="det-content"></div>
        </div>

        <!-- My Orders / Checkout -->
        <div id="checkout-page" class="page">
            <h2 style="margin-bottom:20px;">🛒 My Shopping Bag</h2>
            <div id="cart-list"></div>
            <div id="cart-empty" style="text-align:center; padding:50px 0; display:none;">
                <p>Bag is empty!</p>
                <button class="btn-action" onclick="showPage('home')" style="background:#eee; color:#333; margin-top:10px;">Go Shop</button>
            </div>
            
            <div id="shipping-form" style="margin-top:30px;">
                <h3 style="margin-bottom:15px;">Shipping Details</h3>
                <input type="text" id="u-name" class="form-input" placeholder="Receiver's Name">
                <input type="number" id="u-phone" class="form-input" placeholder="WhatsApp Number">
                <textarea id="u-addr" class="form-input" placeholder="Full Address" style="height:80px;"></textarea>
                <input type="number" id="u-pincode" class="form-input" placeholder="6-Digit Pincode">
                
                <div style="background:white; padding:20px; border-radius:15px; margin:15px 0;">
                    <div style="display:flex; justify-content:space-between; margin-bottom:10px;"><span>Total:</span><span id="sum-mrp" style="text-decoration:line-through; color:#999;">₹0</span></div>
                    <div style="display:flex; justify-content:space-between; font-weight:900; font-size:20px;"><span>Final Price:</span><span id="sum-total">₹0</span></div>
                </div>
                <button class="btn-action" onclick="placeOrder()">Place Order & Pay</button>
            </div>
        </div>

        <!-- Orders History Tab -->
        <div id="history-page" class="page">
            <h2>📦 My Orders</h2>
            <div id="orders-history-list" style="margin-top:20px;"></div>
        </div>

        <!-- Tracking Page -->
        <div id="track-page" class="page">
            <h2>📍 Track Order</h2>
            <div style="margin-top:20px;">
                <input type="text" id="track-id" class="form-input" placeholder="Enter Order ID (GCP-XXXXXX)">
                <button class="btn-action" onclick="trackOrder()">Search Status</button>
                <div id="track-res" style="margin-top:20px;"></div>
            </div>
        </div>

        <!-- Status Page -->
        <div id="status-page" class="page" style="text-align:center; padding-top:80px;">
            <div id="processing-box">
                <div class="loader"></div>
                <h2>Securing Payment...</h2>
                <p>Please do not close the app.</p>
            </div>
            <div id="success-box" style="display:none;">
                <div style="font-size:80px;">✅</div>
                <h2 style="font-weight:900; color:var(--green);">ORDER PLACED!</h2>
                <p id="final-oid" style="background:#eee; padding:10px; display:inline-block; border-radius:10px; margin:15px 0; font-weight:bold;"></p>
                <button class="btn-action" onclick="showPage('home')" style="background:var(--green);">Back to Home</button>
            </div>
        </div>
    </div>
    
    <!-- Naya Payment Page (Line 127 par paste karein) -->
        <div id="payment-page" class="page">
            <div class="container" style="text-align:center;">
                <button onclick="showPage('checkout-page')" style="border:none; background:none; font-weight:800; color:var(--navy); margin-bottom:15px; float:left;">← Back</button>
                <div style="clear:both;"></div>
                <div style="background:white; padding:20px; border-radius:25px; box-shadow:0 10px 30px rgba(0,0,0,0.05);">
                    <h2 style="margin-bottom:5px;">Complete Payment</h2>
                    <p style="color:#666; font-size:14px; margin-bottom:20px;">Payable: <b id="pay-amt" style="color:var(--navy);"></b></p>

                    <div style="background:#f8f9fa; padding:15px; border-radius:15px; border:2px dashed #ddd; margin-bottom:20px;">
                        <p style="font-size:12px; color:#888; margin-bottom:5px;">Copy UPI ID & Pay</p>
                        <div style="display:flex; justify-content:center; align-items:center; gap:10px;">
                            <span id="upi-id-text" style="font-weight:800; font-size:18px; color:var(--navy);">varun@upi</span>
                            <button onclick="copyUPI()" style="background:var(--navy); color:white; border:none; padding:5px 10px; border-radius:8px; font-size:12px;">Copy</button>
                        </div>
                    </div>

                    <div style="background:white; padding:10px; display:inline-block; border:1px solid #eee; border-radius:15px; margin-bottom:20px;">
                        <img src="" id="qr-img" style="width:180px; height:180px;">
                    </div>

                    <div style="text-align:left; margin-top:10px;">
                        <label style="font-size:12px; font-weight:700;">Ref / UTR No.*</label>
                        <input type="text" id="u-utr" class="form-input" placeholder="12 Digit Number" style="border:2px solid var(--navy);">
                    </div>

                    <button class="btn-action" onclick="verifyAndSubmit()" style="background:#2ecc71;">Verify & Submit Order</button>
                </div>
            </div>
        </div>

    <nav>
        <button class="nav-item active" id="n-home" onclick="showPage('home')"><i>🏠</i>Explore</button>
        <button class="nav-item" id="n-history" onclick="showPage('history-page')"><i>📦</i>Orders</button>
        <button class="nav-item" id="n-track" onclick="showPage('track-page')"><i>📍</i>Track</button>
    </nav>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzZiAtCiSXknefI9Qnnd01Ce_FtItvXyJ3HMpjV92MbKpb3rg4aAH9E9xy1b_Quz5tk/exec';

        const PRODUCTS = [
            { id: 1, name: 'Vlog Mic Pro Ultra', mrp: 1499, price: 599, img: 'https://m.media-amazon.com/images/I/71Xmbe9Vp1L._SL1500_.jpg', desc: 'Professional wireless mic with noise cancellation.', colors: ['Black', 'Silver'] },
            { id: 2, name: 'Premium Ring Light 18"', mrp: 2999, price: 1299, img: 'https://m.media-amazon.com/images/I/61NfT-jV9OL._SL1500_.jpg', desc: 'Big LED ring light with tripod stand.', colors: ['White', 'Warm'] },
            { id: 3, name: 'RGB Studio Panel', mrp: 4999, price: 2199, img: 'https://m.media-amazon.com/images/I/61y2VVWv9DL._SL1000_.jpg', desc: 'Full color RGB panel for cinematic lighting.', colors: ['Black'] }
        ];

        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        let myOrders = JSON.parse(localStorage.getItem('myOrders')) || [];

       function renderHome(list = PRODUCTS) {
    const grid = document.getElementById('main-grid');
    if (!grid) return;

    grid.innerHTML = list.map(p => {
        const off = Math.round(((p.mrp - p.price) / p.mrp) * 100);
        return `
            <div class="card" onclick="viewDetail(${p.id})">
                <div class="p-off-pill">-${off}%</div>
                <img src="${p.img}">
                <div class="card-info">
                    <div class="card-title">${p.name}</div>
                    <div style="margin-top:5px;">
                        <span class="p-price">₹${p.price}</span>
                        <span class="p-mrp">₹${p.mrp}</span>
                    </div>
                </div>
            </div>`;
    }).join("");
}
        
        function viewDetail(id) {
            const p = PRODUCTS.find(x => x.id === id);
            document.getElementById('det-content').innerHTML = `
                <button onclick="showPage('home')" style="border:none; background:none; font-weight:800; color:var(--navy); margin-bottom:15px;">← Back</button>
                <div style="background:white; padding:25px; border-radius:30px;">
                    <center><img src="${p.img}" style="width:100%; max-height:280px; object-fit:contain;"></center>
                    <h1 style="margin:15px 0 10px;">${p.name}</h1>
                    <div style="font-size:24px; font-weight:900; color:var(--navy);">₹${p.price} <span style="font-size:16px; color:#999; text-decoration:line-through;">₹${p.mrp}</span></div>
                    <p style="color:#666; margin:15px 0; line-height:1.6;">${p.desc}</p>
                    <div style="display:flex; gap:10px; margin-bottom:20px;">
                        ${p.colors.map(c => `<div style="width:30px; height:30px; border-radius:50%; background:${c.toLowerCase()}; border:2px solid #eee;"></div>`).join('')}
                    </div>
                    <button class="btn-action" onclick="addToCart(${p.id})">Add to Bag</button>
                </div>
            `;
            showPage('details-page');
        }

        function addToCart(id) {
            const item = cart.find(x => x.id === id);
            if(item) item.qty++;
            else cart.push({...PRODUCTS.find(x => x.id === id), qty: 1});
            saveCart();
            alert("Added to Bag!");
        }

        function saveCart() {
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartUI();
        }

        function updateCartUI() {
            const count = cart.reduce((s, i) => s + i.qty, 0);
            document.getElementById('bag-badge').innerText = count;
            
            if(cart.length === 0) {
                document.getElementById('cart-empty').style.display = 'block';
                document.getElementById('shipping-form').style.display = 'none';
                document.getElementById('cart-list').innerHTML = "";
            } else {
                document.getElementById('cart-empty').style.display = 'none';
                document.getElementById('shipping-form').style.display = 'block';
                let total = 0, mrp = 0;
                document.getElementById('cart-list').innerHTML = cart.map(i => {
                    total += (i.price * i.qty); mrp += (i.mrp * i.qty);
                    return `<div style="display:flex; background:white; padding:15px; border-radius:15px; margin-bottom:10px; align-items:center;">
                        <img src="${i.img}" style="width:50px; height:50px; object-fit:contain; margin-right:15px;">
                        <div style="flex:1;"><div style="font-weight:700;">${i.name}</div><div>₹${i.price} x ${i.qty}</div></div>
                        <button onclick="removeItem(${i.id})" style="border:none; background:none; color:red;">✕</button>
                    </div>`;
                }).join('');
                document.getElementById('sum-mrp').innerText = "₹" + mrp;
                document.getElementById('sum-total').innerText = "₹" + total;
            }
            renderHistory();
        }

        function removeItem(id) {
            cart = cart.filter(x => x.id !== id);
            saveCart();
        }

        async function placeOrder() {
            const name = document.getElementById('u-name').value;
            const pin = document.getElementById('u-pincode').value;
            if(!name || !pin || cart.length === 0) return alert("Pincode aur Details bharo bhai!");

            showPage('status-page');
            document.getElementById('processing-box').style.display = 'block';
            document.getElementById('success-box').style.display = 'none';

            const oid = "GCP-" + Math.floor(100000 + Math.random()*900000);
            const orderData = {
                orderId: oid,
                name: name,
                pincode: pin,
                total: document.getElementById('sum-total').innerText,
                date: new Date().toLocaleDateString(),
                status: 'pending'
            };

            const payload = {
                ...orderData,
                phone: document.getElementById('u-phone').value,
                address: document.getElementById('u-addr').value,
                product: cart.map(i => `${i.name} (x${i.qty})`).join(", ")
            };

            try {
                await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
                myOrders.unshift(orderData);
                localStorage.setItem('myOrders', JSON.stringify(myOrders));
                
                setTimeout(() => {
                    document.getElementById('processing-box').style.display = 'none';
                    document.getElementById('success-box').style.display = 'block';
                    document.getElementById('final-oid').innerText = "Order ID: " + oid;
                    cart = []; saveCart();
                    renderHistory(); // Naya order turant list mein jodne ke liye
                }, 2000);
            } catch(e) {
                alert("Server error! Check Internet.");
                showPage('checkout-page');
            }
        }

        function renderHistory() {
    const listDiv = document.getElementById('orders-history-list');
    if (!listDiv) return;

    if (myOrders.length === 0) {
        listDiv.innerHTML = "<p style='text-align:center; padding:20px;'>No orders yet.</p>";
        return;
    }

    listDiv.innerHTML = myOrders.map(o => `
        <div class="order-card" style="background:white; padding:15px; border-radius:15px; margin-bottom:10px; border:1px solid #eee;">
            <div style="display:flex; justify-content:space-between; font-weight:bold;">
                <span>${o.orderId}</span>
                <span style="color:var(--green);">${o.status.toUpperCase()}</span>
            </div>
            <div style="font-size:13px; color:#666; margin-top:5px;">Date: ${o.date}</div>
            <div style="font-weight:700; margin-top:5px;">Total: ${o.total}</div>
        </div>
    `).join('');
}
        
        async function verifyAndSubmit() {
    const utr = document.getElementById('u-utr').value;
    if(!utr) return alert("Bhai, UTR number dalo!");

    showPage('status-page');
    
    const oid = "GCP-" + Math.floor(100000 + Math.random()*900000);
    const payload = {
        orderId: oid,
        name: document.getElementById('u-name').value,
        phone: document.getElementById('u-phone').value,
        address: document.getElementById('u-addr').value,
        total: document.getElementById('sum-total').innerText,
        utr: utr,
        date: new Date().toLocaleDateString(),
        status: 'pending'
    };

    // 1. Google Sheet Link (CORS error fix)
    fetch(SCRIPT_URL, { 
        method: 'POST', 
        mode: 'no-cors', 
        body: JSON.stringify(payload) 
    });

    // 2. My Orders Tab Fix (Save to local memory)
    myOrders.unshift(payload);
    localStorage.setItem('myOrders', JSON.stringify(myOrders));
    
    setTimeout(() => {
        document.getElementById('processing-box').style.display = 'none';
        document.getElementById('success-box').style.display = 'block';
        document.getElementById('final-oid').innerText = "Order ID: " + oid;
        cart = []; 
        saveCart();
        renderHistory(); // Naya order turant list mein dikhega
    }, 2000);
}

async function trackOrder() {
    const id = document.getElementById('track-id').value.trim();
    const res = document.getElementById('track-res');
    if(!id) return alert("Enter ID!");
    res.innerHTML = '<div class="loader"></div>';
    try {
        const r = await fetch(`${SCRIPT_URL}?mode=track&id=${id}`); // 'farch' ko 'fetch' kar diya
        const d = await r.json();
        if(d.error) res.innerHTML = `<div style="background:#fee; padding:20px; border-radius:15px; color:red;">Order Not Found</div>`;
        else res.innerHTML = `<div style="background:white; padding:20px; border-radius:15px; border-left:5px solid var(--green);">Status: ${d.status}</div>`;
    } catch(e) { res.innerHTML = "Network Error!"; }
}

        async function trackOrder() {
            const id = document.getElementById('track-id').value.trim();
            const res = document.getElementById('track-res');
            if(!id) return alert("Enter ID!");
            res.innerHTML = '<div class="loader"></div>';
            try {
                const r = await fetch(`${SCRIPT_URL}?mode=track&id=${id}`);
                const d = await r.json();
                if(d.error) res.innerHTML = `<div style="background:#fee; padding:20px; border-radius:15px; color:red;">Order Not Found!</div>`;
                else res.innerHTML = `<div style="background:white; padding:20px; border-radius:15px; border-left:5px solid var(--green);"><h3>Status: ${d.status.toUpperCase()}</h3><p style="margin-top:10px;">${d.items}</p></div>`;
            } catch(e) { res.innerHTML = "Network Error!"; }
        }

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'home') document.getElementById('n-home').classList.add('active');
            if(id === 'history-page') document.getElementById('n-history').classList.add('active');
            if(id === 'track-page') document.getElementById('n-track').classList.add('active');
            window.scrollTo(0,0);
        }

        function filter() {
            const q = document.querySelector('.search-bar').value.toLowerCase();
            renderHome(PRODUCTS.filter(p => p.name.toLowerCase().includes(q)));
        }

        // --- YAHAN SE PASTE KAREIN (Line 337 ke baad) ---

function copyUPI() {
    const upiText = document.getElementById('upi-id-text').innerText;
    navigator.clipboard.writeText(upiText);
    alert("UPI ID Copy ho gayi! Ab kisi bhi UPI app mein jaakar pay karein.");
}

// Ye naya placeOrder purane wale ko replace karega (agar pehle se hai)
function placeOrder() {
    const name = document.getElementById('u-name').value;
    const pin = document.getElementById('u-pincode').value;
    if(!name || !pin || cart.length === 0) return alert("Bhai, saari details bharo!");

    const total = document.getElementById('sum-total').innerText;
    document.getElementById('pay-amt').innerText = total;

    const amount = total.replace('₹', '');
    const upiId = "varungoyal7910@pnb"; // APNI ID YAHAN DALO
    document.getElementById('qr-img').src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=upi://pay?pa=${upiId}%26pn=VarunStore%26am=${amount}%26cu=INR`;

    showPage('payment-page');
}

async function verifyAndSubmit() {
    const utr = document.getElementById('u-utr').value;
    if(utr.length < 6) return alert("Sahi UTR number ya Ref ID dalo!");

    showPage('status-page');
    document.getElementById('processing-box').style.display = 'block';
    document.getElementById('success-box').style.display = 'none';

    const oid = "GCP-" + Math.floor(100000 + Math.random()*900000);
    const payload = {
        orderId: oid,
        name: document.getElementById('u-name').value,
        phone: document.getElementById('u-phone').value,
        address: document.getElementById('u-addr').value,
        pincode: document.getElementById('u-pincode').value,
        total: document.getElementById('sum-total').innerText,
        utr: utr,
        product: cart.map(i => `${i.name} (x${i.qty})`).join(", "),
        date: new Date().toLocaleDateString(),
        status: 'pending'
    };

    // Google Sheet link se data bhej raha hai
    fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });

    myOrders.unshift(payload);
    localStorage.setItem('myOrders', JSON.stringify(myOrders));

    setTimeout(() => {
        document.getElementById('processing-box').style.display = 'none';
        document.getElementById('success-box').style.display = 'block';
        document.getElementById('final-oid').innerText = "Order ID: " + oid;
        cart = []; 
        saveCart();
    }, 2500);
}

// --- PASTE KHATAM (Iske baad updateCartUI() aur renderHome() pehle se hain) ---

        // Sabse niche paste karein
document.addEventListener('DOMContentLoaded', () => {
    renderHome();
    updateCartUI();
});
        

        updateCartUI();
        renderHome();
    </script>
</body>
</html>
