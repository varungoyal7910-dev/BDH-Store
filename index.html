<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon Clone | Varun Store</title>
    <style>
        :root {
            --amazon-blue: #131921;
            --amazon-light: #232f3e;
            --amazon-yellow: #febd69;
            --amazon-orange: #f3a847;
            --bg: #eaeded;
        }

        body { font-family: Arial, sans-serif; margin: 0; background: var(--bg); padding-bottom: 60px; }

        /* Amazon Header */
        header { background: var(--amazon-blue); padding: 10px 15px; color: white; }
        .nav-top { display: flex; align-items: center; justify-content: space-between; }
        .logo { font-size: 22px; font-weight: bold; color: white; text-decoration: none; }
        .logo span { color: var(--amazon-yellow); }
        
        .search-container { background: white; display: flex; border-radius: 4px; margin-top: 8px; overflow: hidden; }
        .search-container input { border: none; padding: 10px; width: 100%; outline: none; }
        .search-container button { background: var(--amazon-yellow); border: none; padding: 10px 15px; cursor: pointer; }

        /* Category Bar */
        .nav-sub { background: var(--amazon-light); padding: 8px 15px; color: white; font-size: 13px; display: flex; gap: 15px; overflow-x: auto; }

        /* Product Card */
        .container { padding: 10px; }
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .p-card { background: white; padding: 10px; border-radius: 4px; display: flex; flex-direction: column; }
        .p-img { width: 100%; height: 150px; object-fit: contain; }
        .p-title { font-size: 14px; margin: 8px 0; height: 35px; overflow: hidden; }
        .p-price { font-size: 18px; font-weight: bold; }
        .p-price span { font-size: 12px; color: #565959; font-weight: normal; text-decoration: line-through; }
        
        .amz-btn { 
            background: linear-gradient(to bottom, #f7dfa1, #f0c14b);
            border: 1px solid #a88734; border-radius: 8px; padding: 8px;
            font-size: 13px; cursor: pointer; margin-top: auto;
        }

        /* Bottom Nav */
        nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #ddd; }
        .nav-item { text-align: center; font-size: 10px; color: #111; text-decoration: none; }
    </style>
</head>
<body>

<header>
    <div class="nav-top">
        <a href="#" class="logo">varun<span>.in</span></a>
        <div onclick="showCart()">🛒 <b id="cart-count">0</b></div>
    </div>
    <div class="search-container">
        <input type="text" placeholder="Search Varun Store">
        <button>🔍</button>
    </div>
</header>

<div class="nav-sub">
    <span>All</span>
    <span>Mics</span>
    <span>Lights</span>
    <span>Tripods</span>
    <span>Deals</span>
</div>

<div class="container">
    <div class="product-grid" id="main-grid">
        <!-- Products load here -->
    </div>
</div>

<nav>
    <div class="nav-item">🏠<br>Home</div>
    <div class="nav-item">👤<br>Account</div>
    <div class="nav-item">📦<br>Orders</div>
    <div class="nav-item">🆘<br>Help</div>
</nav>

<script>
    const products = [
        { id: 1, name: "Boya BY-M1 Lavalier Microphone", price: 298, oldPrice: 999, img: "https://m.media-amazon.com/images/I/71Xmbe9Vp1L._SL1500_.jpg" },
        { id: 2, name: "Syvo WT 750 Tripod Stand", price: 149, oldPrice: 499, img: "https://m.media-amazon.com/images/I/61Swn6S7unL._SL1500_.jpg" },
        { id: 3, name: "DIGITEK® (DRL-18H) LED Ring Light", price: 599, oldPrice: 1299, img: "https://m.media-amazon.com/images/I/61p-I6R+m7L._SL1500_.jpg" }
    ];

    function render() {
        document.getElementById('main-grid').innerHTML = products.map(p => `
            <div class="p-card">
                <img src="${p.img}" class="p-img" onclick="addToCart(${p.id})">
                <div class="p-title">${p.name}</div>
                <div class="p-price">₹${p.price} <span>₹${p.oldPrice}</span></div>
                <p style="color:#007600; font-size:12px; margin:4px 0;">In stock</p>
                <button class="amz-btn" onclick="addToCart(${p.id})">Add to Cart</button>
            </div>
        `).join('');
    }

    let cartCount = 0;
    function addToCart(id) {
        cartCount++;
        document.getElementById('cart-count').innerText = cartCount;
        alert("Added to cart! Amazon style.");
    }

    render();
</script>

</body>
</html>
