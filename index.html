<!-- Design aur header wahi rahega jo aapke paas hai -->

<div id="cart-page" class="page">
    <div class="detail-card">
        <h3>Shopping Cart</h3>
        <div id="cart-items-list"></div>
        <hr>
        <div style="padding: 10px; font-size: 12px; color: #555;">
            <p>🛡️ <b>7 Days Replacement</b></p>
            <p>🚫 <b>No Cash on Delivery (Prepaid Only)</b></p>
            <p>✅ <b>Guaranteed Product Quality</b></p>
        </div>
        <button class="amz-btn amz-btn-orange" onclick="checkoutFromCart()">Proceed to Buy</button>
    </div>
</div>

<script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbxpq0xom4H-qEydf6-vI6x_oZGXhvMikC6u2rcPI-TA2qbdym0UKsiItv5geb-2aR9R/exec";
    
    let cart = []; // Ab ye array hai Multiple items ke liye
    let selectedColor = ""; // Starting mein khali

    function selColor(el, color) {
        document.querySelectorAll('.color-option').forEach(c => c.classList.remove('selected'));
        el.classList.add('selected');
        selectedColor = color;
    }

    function addToCart(id) {
        // Check if color is selected
        if (selectedColor === "") {
            alert("Bhai, pehle color select karo!");
            return;
        }

        const product = products.find(x => x.id === id);
        const itemInCart = cart.find(x => x.id === id && x.color === selectedColor);

        if (itemInCart) {
            itemInCart.qty++;
        } else {
            cart.push({...product, qty: 1, color: selectedColor});
        }
        
        updateCartUI();
        alert("Cart mein add ho gaya!");
        selectedColor = ""; // Reset for next selection
        showPage('home-page');
    }

    function updateCartUI() {
        const count = cart.reduce((acc, item) => acc + item.qty, 0);
        document.getElementById('cart-count').innerText = count;
        
        const list = document.getElementById('cart-items-list');
        if (cart.length === 0) {
            list.innerHTML = "<p>Cart khali hai!</p>";
            return;
        }

        list.innerHTML = cart.map((item, index) => `
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; border-bottom:1px solid #eee; padding-bottom:10px;">
                <div>
                    <b style="font-size:14px;">${item.name}</b><br>
                    <small>Color: ${item.color} | ₹${item.price}</small>
                </div>
                <div style="display:flex; align-items:center; gap:10px;">
                    <button onclick="changeQty(${index}, -1)" style="width:25px; height:25px; border:1px solid #ccc;">-</button>
                    <b>${item.qty}</b>
                    <button onclick="changeQty(${index}, 1)" style="width:25px; height:25px; border:1px solid #ccc;">+</button>
                </div>
            </div>
        `).join('');
    }

    function changeQty(index, delta) {
        cart[index].qty += delta;
        if (cart[index].qty <= 0) {
            cart.splice(index, 1);
        }
        updateCartUI();
    }

    function openCart() {
        updateCartUI();
        showPage('cart-page');
    }

    function checkoutFromCart() {
        if (cart.length === 0) return alert("Cart khali hai!");
        showPage('address-page');
    }

    // Confirm Order function mein cart ka data bhejne ke liye:
    function confirmOrder() {
        const utr = document.getElementById('u-utr').value;
        if(!utr) return alert("UTR Number dalo.");
        
        const oid = "VAR" + Math.floor(1000 + Math.random() * 9000);
        
        // Sabhi items ko ek string mein convert karna Sheet ke liye
        const productDetails = cart.map(item => `${item.name} (${item.color}) x${item.qty}`).join(", ");
        const finalPrice = cart.reduce((acc, item) => acc + (item.price * item.qty), 0);

        const fd = new FormData();
        fd.append("name", document.getElementById('u-name').value);
        fd.append("phone", document.getElementById('u-phone').value);
        fd.append("address", document.getElementById('u-address').value);
        fd.append("pincode", document.getElementById('u-pin').value);
        fd.append("paymentRef", utr);
        fd.append("totalPrice", finalPrice);
        fd.append("orderID", oid);
        fd.append("product", productDetails);

        fetch(scriptURL, { method: 'POST', body: fd })
        .then(() => {
            cart = [];
            updateCartUI();
            showPage('success-page');
        });
    }
</script>
