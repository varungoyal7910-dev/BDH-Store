<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GOCART ULTIMATE | Pro Edition</title>
    <style>
        :root {
            --primary: #FFB400; --navy: #131921; --bg: #f3f3f3; --text: #111;
            --link: #007185; --success: #2e7d32; --error: #d32f2f;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; background: var(--bg); color: var(--text); padding-bottom: 75px; }

        /* HEADER */
        header { background: var(--navy); padding: 12px 16px; position: sticky; top: 0; z-index: 5000; color: white; }
        .h-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .logo { font-size: 24px; font-weight: 900; letter-spacing: 1px; }
        .logo span { color: var(--primary); }
        .cart-trigger { background: var(--primary); color: var(--navy); padding: 8px 15px; border-radius: 8px; font-weight: 800; cursor: pointer; border: none; }

        .search-bar { display: flex; background: white; border-radius: 6px; overflow: hidden; }
        .search-bar input { border: none; padding: 12px; width: 100%; outline: none; font-size: 16px; color: #333; }
        .search-btn { background: var(--primary); padding: 12px 18px; border: none; cursor: pointer; font-weight: bold; }

        /* BACK ARROW STYLE */
        .back-nav { display: flex; align-items: center; color: var(--link); font-weight: bold; cursor: pointer; margin-bottom: 15px; font-size: 16px; gap: 8px; }
        .back-nav:active { opacity: 0.6; }

        /* PAGE ENGINE */
        .view-page { display: none; padding: 16px; min-height: 80vh; animation: fadeIn 0.3s ease; }
        .active-view { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* PRODUCT CARD */
        .p-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .p-card { background: white; border-radius: 12px; padding: 12px; border: 1px solid #ddd; position: relative; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .p-card img { width: 100%; height: 130px; object-fit: contain; }
        .p-tag { position: absolute; top: 8px; left: 8px; background: #cc0c39; color: white; padding: 2px 6px; border-radius: 3px; font-size: 11px; font-weight: bold; }
        .p-price { font-size: 18px; font-weight: 800; margin-top: 5px; }

        /* DETAILS */
        .det-card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .stars { color: #ffa41c; margin: 10px 0; }
        .color-dot { width: 35px; height: 35px; border-radius: 50%; border: 3px solid #eee; cursor: pointer; display: inline-block; margin-right: 10px; }
        .color-dot.active { border-color: var(--primary); }

        /* BUTTONS */
        .btn-prime { background: #FFD814; border: 1px solid #FCD200; width: 100%; padding: 16px; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 15px; }

        /* LISTS */
        .list-row { background: white; padding: 12px; border-radius: 10px; display: flex; gap: 12px; margin-bottom: 10px; border: 1px solid #ddd; align-items: center; }
        .list-row img { width: 55px; height: 55px; object-fit: contain; }

        /* BOTTOM NAV */
        nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #ddd; padding: 10px 0; z-index: 5000; }
        .nav-tab { flex: 1; text-align: center; font-size: 11px; color: #666; cursor: pointer; border: none; background: none; }
        .nav-tab.active { color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div class="h-top">
        <div class="logo">GO<span>CART</span></div>
        <button class="cart-trigger" onclick="showPage('cart-page')">🛒 Bag (<span id="c-count">0</span>)</button>
    </div>
    <div class="search-bar">
        <input type="text" id="s-input" placeholder="Search for items..." onkeyup="searchNow()">
        <button class="search-btn">🔍</button>
    </div>
</header>

<!-- HOME -->
<div id="home-page" class="view-page active-view">
    <div class="p-grid" id="catalog"></div>
</div>

<!-- DETAILS -->
<div id="details-page" class="view-page">
    <div class="back-nav" onclick="showPage('home-page')">← Back to Gallery</div>
    <div class="det-card">
        <center><img id="d-img" style="width:100%; max-height:250px; object-fit:contain;"></center>
        <h2 id="d-title" style="margin:15px 0 5px 0;"></h2>
        <div class="stars">★★★★★ <small style="color:gray;">(8.5k+ Sold)</small></div>
        <div style="font-size: 26px; font-weight: 900; color: #B12704;" id="d-price"></div>
        <div style="margin: 20px 0;">
            <b>Select Color:</b><br><br>
            <div class="color-dot active" style="background:black;" onclick="selCol(this)"></div>
            <div class="color-dot" style="background:silver;" onclick="selCol(this)"></div>
        </div>
        <p id="d-desc" style="color:#555; line-height:1.6;"></p>
        <button class="btn-prime" onclick="addToBag()">Add to Bag 🛒</button>
    </div>
</div>

<!-- CART -->
<div id="cart-page" class="view-page">
    <div class="back-nav" onclick="showPage('home-page')">← Continue Shopping</div>
    <h3>Shopping Bag</h3>
    <div id="cart-list"></div>
    <div id="cart-sum" style="display:none; background:white; padding:20px; border-radius:15px; margin-top:15px; border:1px solid #ddd;">
        <div style="display:flex; justify-content:space-between; margin-bottom:10px;"><span>Subtotal:</span><span id="s-mrp"></span></div>
        <div style="display:flex; justify-content:space-between; color:green; font-weight:bold;"><span>Discount:</span><span id="s-perc"></span>%</div>
        <hr>
        <div style="display:flex; justify-content:space-between; font-size:20px; font-weight:900;"><span>Total:</span><span id="s-final"></span></div>
        <button class="btn-prime" onclick="showPage('check-page')">Checkout Now</button>
    </div>
</div>

<!-- CHECKOUT -->
<div id="check-page" class="view-page">
    <div class="back-nav" onclick="showPage('cart-page')">← Back to Bag</div>
    <h3>Delivery Address</h3>
    <input type="text" class="btn-prime" style="background:white; text-align:left; font-weight:normal;" placeholder="Full Name">
    <input type="number" class="btn-prime" style="background:white; text-align:left; font-weight:normal;" placeholder="Phone Number">
    <textarea class="btn-prime" style="background:white; text-align:left; font-weight:normal; height:100px;" placeholder="Full Address"></textarea>
    <button class="btn-prime" onclick="alert('Order Placed Successfully!')">Place Order</button>
</div>

<!-- HISTORY -->
<div id="order-page" class="view-page">
    <h3>My Orders</h3>
    <div id="hist-list"></div>
</div>

<nav>
    <button class="nav-tab active" onclick="showPage('home-page')">🏠<br>Home</button>
    <button class="nav-tab" onclick="showPage('order-page')">📦<br>Orders</button>
    <button class="nav-tab" onclick="alert('Tracking active after order!')">📍<br>Track</button>
</nav>

<script>
    const ITEMS = [
        { id: 1, title: 'Creator Vlog Mic', price: 99, mrp: 599, img: 'https://m.media-amazon.com/images/I/71Xmbe9Vp1L._SL1500_.jpg', desc: 'Professional sound for your videos.' },
        { id: 2, title: 'Ring Light Studio', price: 199, mrp: 999, img: 'https://m.media-amazon.com/images/I/61NfT-jV9OL._SL1500_.jpg', desc: '3 light modes with tripod.' },
        { id: 3, title: 'Wireless Lavalier', price: 299, mrp: 1299, img: 'https://m.media-amazon.com/images/I/61T7Y4T4RTL._SL1500_.jpg', desc: 'Best for outdoor creator vlogs.' },
        { id: 4, title: 'Pro Phone Tripod', price: 149, mrp: 499, img: 'https://m.media-amazon.com/images/I/41-pW8P72sL.jpg', desc: 'Sturdy and flexible for all phones.' }
    ];

    let bag = [];
    let curItem = null;

    function renderItems(arr) {
        const div = document.getElementById('catalog');
        div.innerHTML = arr.map(p => `
            <div class="p-card" onclick="viewProd(${p.id})">
                <span class="p-tag">-${Math.round(((p.mrp-p.price)/p.mrp)*100)}%</span>
                <img src="${p.img}">
                <div style="font-size:14px; margin-top:8px; height:32px; overflow:hidden;">${p.title}</div>
                <div class="p-price">₹${p.price}</div>
            </div>
        `).join('');
    }

    function viewProd(id) {
        const p = ITEMS.find(x => x.id === id);
        curItem = p;
        document.getElementById('d-title').innerText = p.title;
        document.getElementById('d-price').innerText = "₹" + p.price;
        document.getElementById('d-img').src = p.img;
        document.getElementById('d-desc').innerText = p.desc;
        showPage('details-page');
    }

    function showPage(id) {
        document.querySelectorAll('.view-page').forEach(v => v.classList.remove('active-view'));
        document.getElementById(id).classList.add('active-view');
        
        document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
        if(id==='home-page') document.querySelectorAll('.nav-tab')[0].classList.add('active');
        if(id==='order-page') document.querySelectorAll('.nav-tab')[1].classList.add('active');
        
        window.scrollTo(0,0);
    }

    function addToBag() {
        bag.push({...curItem});
        document.getElementById('c-count').innerText = bag.length;
        alert("Added to Bag!");
        updateBagUI();
    }

    function updateBagUI() {
        const list = document.getElementById('cart-list');
        const sum = document.getElementById('cart-sum');
        if(bag.length === 0) {
            list.innerHTML = "<center>Bag is empty</center>";
            sum.style.display = 'none';
            return;
        }
        sum.style.display = 'block';
        let totalMrp = 0, final = 0;
        list.innerHTML = bag.map(i => {
            totalMrp += i.mrp; final += i.price;
            return `<div class="list-row"><img src="${i.img}"><b>${i.title}</b><span>₹${i.price}</span></div>`;
        }).join('');
        
        document.getElementById('s-mrp').innerText = "₹" + totalMrp;
        document.getElementById('s-perc').innerText = Math.round(((totalMrp-final)/totalMrp)*100);
        document.getElementById('s-final').innerText = "₹" + final;
    }

    function searchNow() {
        const val = document.getElementById('s-input').value.toLowerCase();
        const filtered = ITEMS.filter(i => i.title.toLowerCase().includes(val));
        renderItems(filtered);
    }

    function selCol(el) {
        document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
        el.classList.add('active');
    }

    renderItems(ITEMS);
</script>
</body>
</html>
