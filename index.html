<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Varun Store | Premium</title>
    <style>
        :root { --primary: #0f172a; --accent: #3b82f6; --success: #10b981; --bg: #f8fafc; --text: #1e293b; --fam: #ffdb00; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg); color: var(--text); overflow-x: hidden; }
        
        /* Professional Header */
        header { background: var(--primary); color: white; padding: 20px 15px; position: sticky; top: 0; z-index: 1000; border-radius: 0 0 20px 20px; }
        .header-top { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 22px; font-weight: 800; letter-spacing: -1px; }
        .cart-icon { position: relative; background: rgba(255,255,255,0.1); padding: 8px; border-radius: 12px; cursor: pointer; }
        #count { position: absolute; top: -5px; right: -5px; background: var(--accent); font-size: 10px; padding: 2px 6px; border-radius: 50%; border: 2px solid var(--primary); }

        /* Grid Layout */
        .container { padding: 15px 15px 120px; }
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { background: white; border-radius: 16px; padding: 10px; border: 1px solid #f1f5f9; cursor: pointer; transition: 0.3s; }
        .card:active { transform: scale(0.96); }
        .card img { width: 100%; height: 140px; object-fit: cover; border-radius: 12px; }
        .card-title { font-size: 13px; font-weight: 600; margin: 8px 0 4px; }
        .card-price { color: var(--accent); font-weight: 800; font-size: 16px; }

        /* PDP & Selection */
        #pdpOverlay { position: fixed; inset: 0; background: white; z-index: 1500; display: none; overflow-y: auto; }
        .image-slider { display: flex; overflow-x: auto; snap-type: x mandatory; scrollbar-width: none; background: #f1f1f1; }
        .image-slider img { width: 100vw; height: 380px; object-fit: cover; snap-align: start; flex-shrink: 0; }
        .pdp-content { padding: 20px; }
        .chips { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
        .chip { border: 1px solid #e2e8f0; padding: 10px 18px; border-radius: 12px; font-size: 13px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .chip.active { border-color: var(--accent); background: #eff6ff; color: var(--accent); box-shadow: 0 4px 10px rgba(59,130,246,0.1); }

        /* Cart Management (+/- and Remove) */
        .cart-item { background: white; padding: 15px; border-radius: 16px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.03); }
        .qty-controls { display: flex; align-items: center; gap: 12px; background: #f1f5f9; padding: 5px 12px; border-radius: 100px; }
        .qty-btn { border: none; background: none; font-weight: bold; font-size: 18px; cursor: pointer; color: var(--primary); }
        .remove-btn { color: #ef4444; font-size: 12px; font-weight: 600; cursor: pointer; border: none; background: none; }

        /* Modal & FamApp Style */
        #overlay { position: fixed; inset: 0; background: rgba(15,23,42,0.9); display: none; z-index: 2000; backdrop-filter: blur(8px); }
        #modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; width: 85%; border-radius: 24px; padding: 25px; display: none; z-index: 2001; text-align: center; }
        .btn-fam { background: var(--fam); color: black; width: 100%; padding: 16px; border: none; border-radius: 14px; font-weight: 800; font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }

        .footer-nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 85%; background: var(--primary); border-radius: 20px; display: flex; justify-content: space-around; padding: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); z-index: 100; }
        .footer-nav div { color: rgba(255,255,255,0.5); font-size: 11px; text-align: center; cursor: pointer; }
        .footer-nav .active { color: white; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div class="header-top">
        <div class="logo">VARUN STORE</div>
        <div class="cart-icon" onclick="showTab('cart')">🛒 <span id="count">0</span></div>
    </div>
</header>

<div class="container" id="mainView">
    <div class="product-grid" id="productDisplay"></div>
</div>

<!-- Product Details -->
<div id="pdpOverlay">
    <div style="padding:15px; border-bottom:1px solid #eee; display:flex; align-items:center; gap:15px;">
        <span onclick="closePDP()" style="font-size:28px; cursor:pointer;">&larr;</span>
        <b id="pdpTitleHeader">Details</b>
    </div>
    <div class="image-slider" id="pdpImages"></div>
    <div class="pdp-content">
        <h2 id="pdpTitle" style="margin:0;"></h2>
        <div class="card-price" id="pdpPrice" style="font-size:24px; margin:10px 0;"></div>
        
        <div style="margin:20px 0;">
            <label style="font-weight:700; font-size:14px; color:#64748b;">Choose Color</label>
            <div class="chips" id="colorGroup">
                <div class="chip active" onclick="updateSelection('color', 'Black', this)">Black</div>
                <div class="chip" onclick="updateSelection('color', 'Blue', this)">Blue</div>
            </div>
        </div>

        <div style="margin:20px 0;">
            <label style="font-weight:700; font-size:14px; color:#64748b;">Select Size</label>
            <div class="chips" id="sizeGroup">
                <div class="chip" onclick="updateSelection('size', 'S', this)">S</div>
                <div class="chip active" onclick="updateSelection('size', 'M', this)">M</div>
                <div class="chip" onclick="updateSelection('size', 'L', this)">L</div>
            </div>
        </div>

        <button onclick="addToCart()" style="width:100%; padding:20px; background:var(--primary); color:white; border:none; border-radius:16px; font-weight:800; margin-top:20px;">ADD TO BAG</button>
    </div>
</div>

<div class="footer-nav">
    <div onclick="showTab('home')" id="hBtn" class="active">🏠<br>Home</div>
    <div onclick="showTab('orders')" id="oBtn">📦<br>Orders</div>
</div>

<div id="overlay"></div>
<div id="modal"></div>

<script>
    let cart = [];
    let orders = JSON.parse(localStorage.getItem('varunOrders')) || [];
    let selectedSize = "M";
    let selectedColor = "Black";
    let activeP = null;

    const products = [
        { id: 1, name: "Premium Leather Case", price: 199, img: "https://images.unsplash.com/photo-1544117518-2b041580c79d?w=400" },
        { id: 2, name: "Wireless Sport Buds", price: 149, img: "https://images.unsplash.com/photo-1590658268037-6bf12165a8df?w=400" },
        { id: 3, name: "Fast Charge Cable", price: 99, img: "https://images.unsplash.com/photo-1625517407003-89c16bc18a5e?w=400" }
    ];

    function renderProducts() {
        document.getElementById('productDisplay').innerHTML = products.map(p => `
            <div class="card" onclick="openPDP(${p.id})">
                <img src="${p.img}">
                <div class="card-title">${p.name}</div>
                <div class="card-price">₹${p.price}</div>
            </div>
        `).join('');
    }

    function openPDP(id) {
        activeP = products.find(x => x.id === id);
        document.getElementById('pdpTitle').innerText = activeP.name;
        document.getElementById('pdpPrice').innerText = "₹" + activeP.price;
        document.getElementById('pdpImages').innerHTML = `<img src="${activeP.img}"><img src="${activeP.img}">`;
        document.getElementById('pdpOverlay').style.display = 'block';
    }

    function closePDP() { document.getElementById('pdpOverlay').style.display = 'none'; }

    function updateSelection(type, val, el) {
        el.parentElement.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        if(type === 'size') selectedSize = val;
        if(type === 'color') selectedColor = val;
    }

    function addToCart() {
        let existing = cart.find(i => i.id === activeP.id && i.size === selectedSize && i.color === selectedColor);
        if(existing) { existing.qty++; } 
        else { cart.push({...activeP, qty: 1, size: selectedSize, color: selectedColor}); }
        updateBadge();
        closePDP();
        alert("Added to Bag!");
    }

    function updateBadge() {
        document.getElementById('count').innerText = cart.reduce((s, i) => s + i.qty, 0);
    }

    function changeQty(index, delta) {
        cart[index].qty += delta;
        if(cart[index].qty < 1) cart.splice(index, 1);
        updateBadge();
        showTab('cart');
    }

    function removeFromCart(index) {
        cart.splice(index, 1);
        updateBadge();
        showTab('cart');
    }

    function showTab(tab) {
        let v = document.getElementById('mainView');
        document.getElementById('hBtn').classList.remove('active');
        document.getElementById('oBtn').classList.remove('active');

        if(tab === 'home') {
            document.getElementById('hBtn').classList.add('active');
            v.innerHTML = `<div class="product-grid" id="productDisplay"></div>`;
            renderProducts();
        } 
        else if(tab === 'cart') {
            let total = cart.reduce((s, i) => s + (i.price * i.qty), 0);
            if(cart.length === 0) return v.innerHTML = "<div style='text-align:center; padding:100px 20px;'>Your bag is empty! 🛍️</div>";
            v.innerHTML = `
                <h3 style="margin-bottom:20px;">Shopping Bag</h3>
                ${cart.map((item, idx) => `
                    <div class="cart-item">
                        <div>
                            <div style="font-weight:700; font-size:14px;">${item.name}</div>
                            <div style="font-size:11px; color:#666;">${item.size} | ${item.color}</div>
                            <button class="remove-btn" onclick="removeFromCart(${idx})">Remove</button>
                        </div>
                        <div style="text-align:right;">
                            <div style="font-weight:800; margin-bottom:8px;">₹${item.price * item.qty}</div>
                            <div class="qty-controls">
                                <button class="qty-btn" onclick="changeQty(${idx}, -1)">−</button>
                                <span style="font-size:14px; font-weight:700;">${item.qty}</span>
                                <button class="qty-btn" onclick="changeQty(${idx}, 1)">+</button>
                            </div>
                        </div>
                    </div>
                `).join('')}
                <div style="background:var(--primary); color:white; padding:25px; border-radius:24px; margin-top:20px;">
                    <div style="display:flex; justify-content:space-between; margin-bottom:20px;"><span>Grand Total</span><span style="font-size:24px; font-weight:800;">₹${total}</span></div>
                    <input type="text" id="cn" placeholder="Receiver Name" style="width:100%; margin-bottom:10px; padding:15px; border-radius:12px; border:none;">
                    <input type="number" id="cp" placeholder="WhatsApp Number" style="width:100%; margin-bottom:10px; padding:15px; border-radius:12px; border:none;">
                    <textarea id="ca" placeholder="Full Delivery Address" style="width:100%; margin-bottom:20px; padding:15px; border-radius:12px; border:none; height:80px;"></textarea>
                    <button onclick="checkout(${total})" style="width:100%; padding:18px; background:var(--accent); color:white; border:none; border-radius:16px; font-weight:800;">PROCEED TO PAY</button>
                </div>
            `;
        }
        else if(tab === 'orders') {
            document.getElementById('oBtn').classList.add('active');
            v.innerHTML = `<h3 style="margin-bottom:20px;">My Orders</h3>` + (orders.length === 0 ? "<p>No orders yet.</p>" : orders.map(o => `
                <div style="background:white; padding:15px; border-radius:16px; margin-bottom:12px; border-left:5px solid var(--accent);">
                    <div style="display:flex; justify-content:space-between;"><b>${o.id}</b><span style="color:orange; font-size:12px; font-weight:700;">${o.status}</span></div>
                    <div style="font-size:12px; color:#666; margin-top:5px;">Amount: ₹${o.price} | Date: ${o.date}</div>
                </div>
            `).reverse().join(''));
        }
    }

    function checkout(total) {
        const n = document.getElementById('cn').value;
        const p = document.getElementById('cp').value;
        const a = document.getElementById('ca').value;
        if(!n || !p || !a) return alert("Puri details bharo!");

        let oid = "#VAR-" + Math.floor(1000 + Math.random() * 9000);

        fetch("https://formspree.io/f/xknadjkb", {
            method: "POST",
            body: JSON.stringify({Order: oid, Name: n, Phone: p, Amount: total, Address: a, Items: JSON.stringify(cart)}),
            headers: {'Content-Type': 'application/json'}
        });

        document.getElementById('overlay').style.display = 'block';
        document.getElementById('modal').style.display = 'block';
        document.getElementById('modal').innerHTML = `
            <h3 style="margin-bottom:10px;">Safe Checkout</h3>
            <p style="font-size:12px; color:#666; margin-bottom:20px;">Aapka order FamApp UPI par process ho raha hai.</p>
            
            <button onclick="payNow(${total}, '${oid}')" class="btn-fam">
                ⚡ Pay via FamApp (UPI)
            </button>

            <div style="margin:20px 0; color:#cbd5e1; font-weight:bold; font-size:10px;">OR SCAN QR</div>
            
            <div style="background:#f8fafc; border:1px solid #e2e8f0; padding:15px; border-radius:16px;">
                <img src="YOUR_FAM_QR_LINK" style="width:140px; height:140px; border:1px solid #eee;">
                <div style="margin-top:10px; font-size:13px; font-weight:800; color:var(--primary);">9464961098@fam</div>
            </div>

            <button onclick="finalStatus('${oid}', ${total})" style="margin-top:20px; background:none; border:none; color:var(--accent); font-weight:800; text-decoration:underline; font-size:13px;">I have paid ➜</button>
        `;
    }

    function payNow(t, id) {
        window.location.href = `upi://pay?pa=9464961098@fam&pn=Varun%20Goyal&am=${t}&cu=INR&tn=${id}`;
        setTimeout(() => finalStatus(id, t), 2000);
    }

    function finalStatus(id, t) {
        document.getElementById('modal').innerHTML = `
            <div class="loader"></div>
            <h3 style="margin-top:15px;">Validating Payment</h3>
            <p style="color:#666; font-size:12px;">FamApp system se confirmation li ja rahi hai...</p>
        `;
        setTimeout(() => {
            document.getElementById('modal').innerHTML = `
                <div style="font-size:50px; margin-bottom:15px;">⏳</div>
                <h2 style="font-size:22px; color:var(--primary);">Request Received!</h2>
                <p style="color:#64748b; font-size:13px; padding:0 10px;">Bhai, hum <b>15-30 mins</b> mein payment check karke order confirm kar denge.</p>
                <div style="background:#f1f5f9; padding:15px; border-radius:12px; margin:20px 0; font-family:monospace; font-weight:bold;">ID: ${id}</div>
                <button onclick="closeModal()" style="width:100%; padding:15px; background:var(--primary); color:white; border:none; border-radius:12px; font-weight:bold;">Theek Hai</button>
            `;
            orders.push({id: id, price: t, status: "Awaiting Confirmation", date: new Date().toLocaleDateString()});
            localStorage.setItem('varunOrders', JSON.stringify(orders));
            cart = []; updateBadge();
        }, 5000);
    }

    function closeModal() { document.getElementById('overlay').style.display = 'none'; document.getElementById('modal').style.display = 'none'; showTab('orders'); }

    renderProducts();
</script>
</body>
</html>
