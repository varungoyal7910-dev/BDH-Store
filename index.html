<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOCART | Pro Shop</title><link rel="icon" href="https://cdn-icons-png.flaticon.com/512/891/891462.png"><style>
body{margin:0;font-family:Arial;background:#f0f2f2;padding-bottom:90px}
header{background:#131921;color:#fff;padding:12px;font-size:22px;font-weight:bold}
header span{color:#00C853}
.p-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:10px}
.p-card{background:#fff;padding:10px;border-radius:8px;text-align:center}
.p-img{width:100%;height:120px;object-fit:contain}
.page{display:none;padding:10px}
.active{display:block}
button{width:100%;padding:12px;border:none;border-radius:20px;margin-top:10px;background:#FFD814}
.orange{background:#FFA41C}
input{width:100%;padding:12px;margin:8px 0;border:1px solid #aaa;border-radius:6px}
#msg{margin-top:10px;font-weight:bold}
</style></head><body><header onclick="show('home')">GO<span>CART</span></header><div id="home" class="page active">
<div class="p-grid" id="list"></div>
</div><div id="detail" class="page"><div id="detailBox"></div></div><div id="cart" class="page">
<h3>Cart</h3>
<div id="cartList"></div>
<button class="orange" onclick="show('address')">Order Now</button>
</div><div id="address" class="page">
<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="addr" placeholder="Address">
<input id="pin" placeholder="Pincode">
<button class="orange" onclick="show('payment');genQR()">Continue</button>
</div><div id="payment" class="page">
<h3>Scan & Pay</h3>
<div id="qr"></div>
<p>UPI: <b>varungoyal7910@pnb</b></p><input id="coupon" placeholder="Coupon Code">
<button onclick="applyCoupon()">Apply</button><input id="utr" placeholder="Enter UTR">
<button class="orange" onclick="placeOrder()">Confirm Order</button>
</div><div id="success" class="page">
<h2>✅ Order Placed</h2>
<p id="oid"></p>
</div><div id="track" class="page">
<h3>Track Order</h3>
<input id="trackid" placeholder="Enter Order ID">
<button onclick="track()">Track</button>
<div id="msg"></div>
</div><a href="https://wa.me/919417124082"
style="position:fixed;bottom:100px;right:15px;background:#25D366;color:#fff;padding:12px;border-radius:50%;">💬</a>

<script>

const scriptURL="https://script.google.com/macros/s/AKfycbxpq0xom4H-qEydf6-vI6x_oZGXhvMikC6u2rcPI-TA2qbdym0UKsiItv5geb-2aR9R/exec";

let cart=[],discount=0;

const products=[
{id:1,name:"Mic",price:99,img:"https://m.media-amazon.com/images/I/71Xmbe9Vp1L._SL1500_.jpg"},
{id:2,name:"Tripod",price:149,img:"https://m.media-amazon.com/images/I/61Swn6S7unL._SL1500_.jpg"},
{id:3,name:"Ring Light",price:199,img:"https://m.media-amazon.com/images/I/61p-I6R+m7L._SL1500_.jpg"}
];

function show(p){
document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
document.getElementById(p).classList.add('active');
}

function render(){
document.getElementById('list').innerHTML=products.map(p=>`
<div class="p-card" onclick="view(${p.id})">
<img src="${p.img}" class="p-img">
<p>${p.name}</p>
<b>₹${p.price}</b>
</div>`).join('');
}

function view(id){
let p=products.find(x=>x.id==id);
document.getElementById('detailBox').innerHTML=`
<img src="${p.img}" style="width:100%">
<h3>${p.name}</h3>
<b>₹${p.price}</b>
<button class="orange" onclick="add(${p.id})">Add to Cart</button>
`;
show('detail');
}

function add(id){
cart.push(products.find(x=>x.id==id));
alert("Added to cart");
}

function genQR(){
let total=cart.reduce((a,b)=>a+b.price,0);
if(total<199) total+=40;
total-=discount;

let upi=`upi://pay?pa=varungoyal7910@pnb&pn=GOCART&am=${total}&cu=INR`;

document.getElementById('qr').innerHTML=
`<img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(upi)}">`;
}

function applyCoupon(){
let c=document.getElementById('coupon').value;
if(c==="VARUN10"){discount=10;alert("Applied")}
else alert("Invalid");
}

function placeOrder(){

let utr=document.getElementById('utr').value;
if(utr.length<8) return alert("Invalid UTR");

let id="ORD"+Date.now();

let total=cart.reduce((a,b)=>a+b.price,0);

let fd=new FormData();
fd.append("orderID",id);
fd.append("name",document.getElementById('name').value);
fd.append("phone",document.getElementById('phone').value);
fd.append("address",document.getElementById('addr').value);
fd.append("pincode",document.getElementById('pin').value);
fd.append("product",JSON.stringify(cart));
fd.append("totalPrice",total);
fd.append("paymentRef",utr);

fetch(scriptURL,{method:"POST",body:fd}).then(()=>{
document.getElementById('oid').innerText="Order ID: "+id;
cart=[];
show('success');
});
}

function track(){
let id=document.getElementById('trackid').value;

fetch(scriptURL+"?orderID="+id)
.then(r=>r.json())
.then(d=>{
if(d.status==="NOT_FOUND"){
document.getElementById('msg').innerText="❌ Not Found";
}else{
document.getElementById('msg').innerText="📦 "+d.status;
}
});
}

render();

</script></body>
</html>
