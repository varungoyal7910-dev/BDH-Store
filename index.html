<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Varun Store | Official</title>
    <style>
        :root { --accent: #e91e63; --bg: #f4f7f6; --text: #333; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: var(--text); padding-bottom: 80px; }
        
        header { background: #fff; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 1000; }
        .logo-area { display: flex; align-items: center; gap: 10px; }
        .logo-img { width: 35px; height: 35px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: bold; }
        .logo-text { font-size: 18px; font-weight: bold; color: var(--accent); }
        .cart-icon { font-size: 24px; cursor: pointer; position: relative; }
        .cart-count { position: absolute; top: -5px; right: -10px; background: #000; color: #fff; font-size: 10px; padding: 2px 6px; border-radius: 50%; }

        .search-area { background: #fff; padding: 10px; border-bottom: 1px solid #eee; }
        .filter-chips { display: flex; gap: 8px; overflow-x: auto; padding: 5px 0; scrollbar-width: none; }
        .chip { padding: 7px 15px; background: #f0f0f0; border-radius: 20px; font-size: 12px; cursor: pointer; white-space: nowrap; border: 1px solid transparent; }
        .chip.active { border-color: var(--accent); color: var(--accent); background: #fff; font-weight: bold; }

        .container { padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .p-card { background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); position: relative; }
        .p-img { width: 100%; height: 160px; object-fit: cover; }
        .discount-badge { position: absolute; top: 8px; left: 8px; background: #4caf50; color: #fff; font-size: 10px; padding: 3px 7px; border-radius: 4px; font-weight: bold; }
        .p-info { padding: 10px; }
        .p-name { font-size: 13px; font-weight: 600; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .p-price { font-size: 15px; font-weight: bold; color: var(--accent); }
        .p-mrp { font-size: 11px; text-decoration: line-through; color: #888; margin-left: 5px; }

        .modal { position: fixed; inset: 0; background: #fff; z-index: 3000; display: none; flex-direction: column; overflow-y: auto; }
        .modal-header { padding: 15px; border-bottom: 1px solid #eee; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: #fff; }
        .trust-tag { display: flex; align-items: center; gap: 10px; font-size: 12px; margin-top: 8px; color: #555; background: #f9f9f9; padding: 8px; border-radius: 6px; }

        .color-dot { width: 30px; height: 30px; border-radius: 50%; border: 2px solid #ddd; cursor: pointer; display: inline-block; margin-right: 10px; }
        .color-dot.selected { border-color: #000; transform: scale(1.1); }

        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: flex-end; z-index: 2000; }
        .overlay-content { background: #fff; width: 100%; max-height: 85vh; border-radius: 20px 20px 0 0; padding: 20px; overflow-y: auto; box-sizing: border-box; }
        
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #eee; }
        .qty-controls { display: flex; align-items: center; gap: 12px; background: #f0f0f0; padding: 5px 10px; border-radius: 6px; }
        .qty-btn { border: none; background: none; font-size: 18px; font-weight: bold; cursor: pointer; }

        .btn-main { background: var(--accent); color: #fff; border: none; padding: 16px; border-radius: 10px; width: 100%; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 15px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; box-sizing: border-box; }

        nav { position: fixed; bottom: 0; width: 100%; background: #fff; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #ddd; z-index: 1000; }
        .nav-item { text-align: center; font-size: 11px; color: #888; flex: 1; cursor: pointer; }
        .nav-item.active { color: var(--accent); font-weight: bold; }
        
        .page { display: none; }
        .page.active { display: block; }

        #toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 10px 20px; border-radius: 30px; display: none; z-index: 5000; }
    </style>
</head>
<body>

<div id="toast">Item Added to Bag!</div>

<header>
    <div class="logo-area"><div class="logo-img">V</div><div class="logo-text">VARUN STORE</div></div>
    <div class="cart-icon" onclick="openCart()">🛍️ <span class="cart-count" id="cart-count">0</span></div>
</header>

<div id="home-page" class="page active">
    <div class="search-area">
        <div class="filter-chips">
            <div class="chip active" onclick="filterByPrice('all', this)">All Items</div>
            <div class="chip" onclick="filterByPrice(149, this)">Under 149</div>
            <div class="chip" onclick="filterByPrice(499, this)">Under 499</div>
        </div>
    </div>
    <div id="product-list" class="container"></div>
</div>

<div id="orders-page" class="page" style="padding:20px;">
    <h3>My Orders</h3>
    <div id="my-orders-list">Koi order nahi mila.</div>
</div>

<div id="track-page" class="page" style="padding:20px;">
    <h3>Track Order</h3>
    <input type="text" id="track-input" placeholder="Enter Order ID">
    <button class="btn-main" onclick="trackLive()">Check Status</button>
    <div id="track-result" style="margin-top:20px;"></div>
</div>

<div id="p-modal" class="modal">
    <div class="modal-header"><span onclick="closeModal()" style="font-size:28px; cursor:pointer;">✕</span> <b>Details</b> <span></span></div>
    <div id="modal-content" style="padding:20px;"></div>
</div>

<div id="cart-overlay" class="overlay"><div class="overlay-content" id="cart-body"></div></div>

<nav>
    <div class="nav-item active" onclick="switchPage('home', this)">🏠<br>Home</div>
    <div class="nav-item" onclick="switchPage('orders', this)">📋<br>My Orders</div>
    <div class="nav-item" onclick="switchPage('track', this)">🚚<br>Tracking</div>
</nav>

<script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbxfoHDe7kKojTS6b_u0fkG_rrgliVXSDBeQnltEo5Xi8QNL7QDopaGNSGPSFn5neujG/exec";
    
    const products = [
        { id: 201, name: "Premium Silicone Case", price: 149, mrp: 499, img: "https://via.placeholder.com/300", colors: ["Black", "Blue", "Gold"] },
        { id: 202, name: "M10 Wireless Earbuds", price: 499, mrp: 1299, img: "https://via.placeholder.com/300", colors: ["Black", "White"] }
    ];

    let cart = [], selectedColor = "";

    function renderItems(data = products) {
        document.getElementById('product-list').innerHTML = data.map(p => {
            let disc = Math.round(((p.mrp - p.price) / p.mrp) * 100);
            return `
            <div class="p-card" onclick="viewProduct(${p.id})">
                <span class="discount-badge">${disc}% OFF</span>
                <img src="${p.img}" class="p-img">
                <div class="p-info">
                    <span class="p-name">${p.name}</span>
                    <span class="p-price">₹${p.price}</span> <span class="p-mrp">₹${p.mrp}</span>
                </div>
            </div>`;
        }).join('');
    }
    renderItems();

    function viewProduct(id) {
        const p = products.find(x => x.id === id);
        selectedColor = "";
        document.getElementById('p-modal').style.display = 'flex';
        document.getElementById('modal-content').innerHTML = `
            <img src="${p.img}" style="width:100%; border-radius:12px;">
            <h2 style="margin:15px 0 5px;">${p.name}</h2>
            <div style="font-size:20px; color:var(--accent); font-weight:bold;">₹${p.price} <small style="text-decoration:line-through; color:#888;">₹${p.mrp}</small></div>
            
            <div class="trust-tag">❌ Cash on Delivery Not Available</div>
            <div class="trust-tag">✅ 7 Days Full Replacement</div>
            <div class="trust-tag">🚚 Free Delivery All Over India</div>

            <h4 style="margin-top:20px;">Select Color:</h4>
            <div style="margin-bottom:20px;">
                ${p.colors.map(c => `<div class="color-dot" style="background:${c.toLowerCase()};" onclick="pickColor('${c}', this)"></div>`).join('')}
            </div>
            <button class="btn-main" onclick="addItem(${p.id})">Add to Bag</button>
        `;
    }

    function pickColor(c, el) {
        selectedColor = c;
        document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('selected'));
        el.classList.add('selected');
    }

    function addItem(id) {
        if(!selectedColor) return alert("Please select a color first!");
        const p = products.find(x => x.id === id);
        let exist = cart.find(i => i.id === id && i.color === selectedColor);
        if(exist) exist.qty++; else cart.push({...p, color: selectedColor, qty: 1});
        
        updateBagCount();
        closeModal();
        
        // Show Toast instead of opening cart immediately
        let toast = document.getElementById('toast');
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 2000);
    }

    function updateBagCount() {
        document.getElementById('cart-count').innerText = cart.reduce((a,b) => a + b.qty, 0);
    }

    function openCart() {
        document.getElementById('cart-overlay').style.display = 'flex';
        const body = document.getElementById('cart-body');
        if(cart.length === 0) { body.innerHTML = "<h3>Your Bag is Empty</h3><button class='btn-main' onclick='closeCart()'>Continue Shopping</button>"; return; }
        
        let subtotal = cart.reduce((a,b) => a + (b.price * b.qty), 0);
        body.innerHTML = `<h3>Shopping Bag</h3>` + cart.map((item, i) => `
            <div class="cart-item">
                <div style="flex:1;"><b>${item.name}</b><br><small>Color: ${item.color}</small></div>
                <div class="qty-controls">
                    <button class="qty-btn" onclick="adjustQty(${i}, -1)">-</button>
                    <span>${item.qty}</span>
                    <button class="qty-btn" onclick="adjustQty(${i}, 1)">+</button>
                </div>
                <div style="width:70px; text-align:right;"><b>₹${item.price * item.qty}</b></div>
            </div>`).join('') + `
            <div style="margin-top:20px; display:flex; justify-content:space-between; font-size:18px;"><b>Total:</b> <b>₹${subtotal}</b></div>
            <button class="btn-main" onclick="showAddress(${subtotal})">Order Now</button>
            <button class="btn-main" style="background:#888; margin-top:5px;" onclick="closeCart()">Add More Items</button>`;
    }

    function adjustQty(i, delta) {
        cart[i].qty += delta;
        if(cart[i].qty <= 0) cart.splice(i, 1);
        updateBagCount();
        openCart();
    }

    function showAddress(total) {
        document.getElementById('cart-body').innerHTML = `
            <h3>Delivery Details</h3>
            <input type="text" id="cust-name" placeholder="Full Name">
            <input type="text" id="cust-phone" placeholder="Mobile Number">
            <input type="text" id="cust-addr" placeholder="Full Address with Landmark">
            <input type="text" id="cust-pin" placeholder="Pincode">
            <button class="btn-main" onclick="proceedToPay(${total})">Go to Payment</button>`;
    }

    function proceedToPay(total) {
        const name = document.getElementById('cust-name').value;
        if(!name) return alert("Pehle details bharo bhai!");
        
        document.getElementById('cart-body').innerHTML = `
            <div style="text-align:center;">
                <h3>Total Amount: ₹${total}</h3>
                <p>Scan the QR Code to Pay:</p>
                <img src="https://i.ibb.co/3ykC6Wj/pnbqr.png" style="width:200px; border:1px solid #ddd; border-radius:10px;">
                <p style="margin-top:10px; font-size:12px;"><b>UPI ID: varungoyal7910@pnb</b></p>
                <hr>
                <p>Payment ke baad <b>UTR (Ref) Number</b> yahan dalein:</p>
                <input type="text" id="utr-ref" placeholder="Enter 12-digit UTR Number">
                <button class="btn-main" onclick="finalizeOrder(${total})">Confirm Order</button>
            </div>`;
    }

    async function finalizeOrder(total) {
        const utr = document.getElementById('utr-ref').value;
        if(!utr) return alert("UTR number likhna zaruri hai!");
        
        const orderID = "VAR" + Math.floor(100000 + Math.random() * 900000);
        const orderDetails = cart.map(i => `${i.name}(${i.color})x${i.qty}`).join(", ");
        
        const data = {
            name: document.getElementById('cust-name').value,
            phone: document.getElementById('cust-phone').value,
            addr: document.getElementById('cust-addr').value,
            pin: document.getElementById('cust-pin').value,
            payRef: utr,
            total: total,
            date: new Date().toLocaleString('en-IN'),
            orderID: orderID,
            orderDetails: orderDetails
        };

        document.getElementById('cart-body').innerHTML = "<h4>Processing Order... Plz wait</h4>";
        
        try {
            await fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
            
            // Local Storage for History
            let history = JSON.parse(localStorage.getItem('my_orders') || '[]');
            history.push({ id: orderID, date: data.date, items: orderDetails, total: total });
            localStorage.setItem('my_orders', JSON.stringify(history));

            alert("Order Successful! Order ID: " + orderID);
            cart = []; updateBagCount(); location.reload();
        } catch (e) {
            alert("Error saving order. Please try again.");
        }
    }

    function switchPage(page, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(page + '-page').classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');

        if(page === 'orders') {
            let h = JSON.parse(localStorage.getItem('my_orders') || '[]');
            document.getElementById('my-orders-list').innerHTML = h.reverse().map(o => `
                <div style="background:#fff; padding:15px; border-radius:10px; margin-bottom:12px; border-left:5px solid var(--accent);">
                    <b style="color:var(--accent);">ID: ${o.id}</b><br>
                    <small>${o.date}</small><br>
                    <div style="margin-top:5px; font-size:13px;">${o.items}</div>
                    <b>Total: ₹${o.total}</b>
                </div>`).join('') || "No orders yet.";
        }
    }

    async function trackLive() {
        const id = document.getElementById('track-input').value.trim();
        if(!id) return alert("Order ID toh dalo!");
        const out = document.getElementById('track-result');
        out.innerHTML = "Status check ho raha hai...";
        try {
            const resp = await fetch(`${scriptURL}?orderID=${id}`);
            const status = await resp.text();
            out.innerHTML = `<div style="background:#e3f2fd; padding:15px; border-radius:8px;"><b>Status:</b> ${status}</div>`;
        } catch(e) { out.innerHTML = "Error! ID check karein."; }
    }

    function filterByPrice(p, el) {
        document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        renderItems(p === 'all' ? products : products.filter(i => i.price <= p));
    }

    function closeModal() { document.getElementById('p-modal').style.display = 'none'; }
    function closeCart() { document.getElementById('cart-overlay').style.display = 'none'; }
</script>
</body>
</html>
