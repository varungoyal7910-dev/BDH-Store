<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GOCART PRO | Varun Edition</title>
    <style>
        :root { --primary: #FFB400; --navy: #131921; --amazon-red: #CC0C39; --bg: #f3f3f3; --text: #111; --success: #2e7d32; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); padding-bottom: 80px; color: var(--text); }
        
        /* Header */
        header { background: var(--navy); padding: 15px; color: white; position: sticky; top: 0; z-index: 1000; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 20px; font-weight: 900; }
        .logo span { color: var(--primary); }
        .cart-btn { background: var(--primary); border: none; padding: 8px 15px; border-radius: 8px; font-weight: bold; position: relative; cursor: pointer; }
        #cart-count { background: red; color: white; border-radius: 50%; padding: 2px 6px; font-size: 10px; position: absolute; top: -5px; right: -5px; }

        /* Search & Filter Area */
        .search-area { background: white; padding: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .search-bar { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; margin-bottom: 10px; }
        .filter-row { display: flex; align-items: center; justify-content: space-between; font-size: 14px; }
        input[type=range] { flex: 1; margin: 0 10px; accent-color: var(--primary); }

        /* Amazon Style Product Cards */
        .page { display: none; padding: 15px; animation: fadeIn 0.3s ease; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .card { background: white; border-radius: 10px; padding: 10px; border: 1px solid #ddd; text-align: left; position: relative; }
        .card img { width: 100%; height: 130px; object-fit: contain; }
        .card-title { font-size: 14px; margin: 8px 0; height: 35px; overflow: hidden; line-height: 1.2; }
        .price-row { display: flex; align-items: center; gap: 5px; margin-top: 5px; }
        .p-price { font-size: 18px; font-weight: bold; }
        .p-mrp { text-decoration: line-through; color: #767676; font-size: 12px; }
        .p-off { color: var(--amazon-red); font-weight: bold; font-size: 13px; }

        /* Details View */
        .badge { background: #eee; padding: 5px 10px; border-radius: 5px; font-size: 12px; display: inline-block; margin-right: 5px; margin-top: 10px; }
        .color-opt { width: 30px; height: 30px; border-radius: 50%; display: inline-block; border: 2px solid #ddd; margin: 10px 5px; cursor: pointer; }
        .color-opt.active { border-color: var(--navy); transform: scale(1.1); }

        /* Cart & Payment */
        .cart-item { background: white; padding: 12px; border-radius: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .qr-section { text-align: center; background: white; padding: 20px; border-radius: 15px; margin: 15px 0; border: 2px dashed #ccc; }
        .btn-pay { background: #FFD814; border: 1px solid #FCD200; width: 100%; padding: 15px; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; }

        /* Navigation */
        nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #ddd; padding: 12px 0; }
        .nav-item { flex: 1; text-align: center; font-size: 11px; background: none; border: none; color: #666; cursor: pointer; }
        .nav-item.active { color: var(--primary); font-weight: bold; }
        
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 50px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<header>
    <div class="logo">GO<span>CART</span> PRO</div>
    <button class="cart-btn" onclick="showPage('cart-page')">🛒 BAG <span id="cart-count">0</span></button>
</header>

<!-- HOME PAGE -->
<div id="home" class="page active">
    <div class="search-area">
        <input type="text" id="search-in" class="search-bar" placeholder="Search for items..." oninput="filter()">
        <div class="filter-row">
            <span>Price Under: ₹<b id="p-val">2000</b></span>
            <input type="range" id="p-range" min="100" max="2000" value="2000" oninput="filter()">
        </div>
    </div>
    <div class="grid" id="main-grid" style="margin-top:15px;"></div>
</div>

<!-- PRODUCT INFO -->
<div id="info-page" class="page">
    <button onclick="showPage('home')" style="border:none; color:blue; background:none; font-weight:bold;">← Continue Shopping</button>
    <div id="info-content" style="margin-top:15px; background:white; padding:15px; border-radius:10px;"></div>
</div>

<!-- CART PAGE -->
<div id="cart-page" class="page">
    <h3>Shopping Bag</h3>
    <div id="cart-list"></div>
    <div style="background:white; padding:15px; border-radius:10px; margin-top:15px;">
        <div style="display:flex; justify-content:space-between;"><span>Total MRP:</span><span id="sum-mrp">₹0</span></div>
        <div style="display:flex; justify-content:space-between; color:green;"><span>Discount:</span><span id="sum-disc">-₹0</span></div>
        <hr>
        <div style="display:flex; justify-content:space-between; font-weight:bold; font-size:20px;"><span>Final Pay:</span><span id="sum-total">₹0</span></div>
        <button class="btn-pay" style="margin-top:15px;" onclick="showPage('check-page')">Proceed to Checkout</button>
    </div>
</div>

<!-- CHECKOUT -->
<div id="check-page" class="page">
    <h3>Delivery Details</h3>
    <input type="text" id="u-name" class="search-bar" placeholder="Full Name">
    <input type="number" id="u-phone" class="search-bar" placeholder="WhatsApp Number">
    <textarea id="u-addr" class="search-bar" placeholder="Complete Address with Pincode"></textarea>
    <button class="btn-pay" onclick="showPage('pay-page')">Review & Pay</button>
</div>

<!-- PAYMENT -->
<div id="pay-page" class="page">
    <div class="qr-section">
        <p>Total to Pay: <b style="font-size:22px;">₹<span id="final-amt">0</span></b></p>
        <img src="" id="qr-code-img" style="width:160px; height:160px;">
        <div style="background:#eee; padding:10px; border-radius:5px; margin-top:10px; font-size:12px;" onclick="navigator.clipboard.writeText('varun@upi'); alert('UPI ID Copied!')">
            UPI ID: varun@upi (Tap to copy)
        </div>
    </div>
    <input type="text" id="u-ref" class="search-bar" placeholder="Enter Ref / UTS Number (Required)">
    <button class="btn-pay" onclick="finalizeOrder()">Confirm Order</button>
</div>

<!-- SUCCESS -->
<div id="success" class="page" style="text-align:center; margin-top:50px;">
    <div style="font-size:60px;">📦</div>
    <h2 style="color:var(--success);">ORDER PLACED!</h2>
    <p>Order ID: <b id="order-id-view" style="color:var(--primary); font-size:20px;"></b></p>
    <audio id="s-sound" src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3"></audio>
    <button class="btn-pay" onclick="location.reload()">Continue Shopping</button>
</div>

<!-- TRACK/ORDERS PAGE -->
<div id="track-page" class="page">
    <h3>Track Your Order</h3>
    <input type="text" id="track-id" class="search-bar" placeholder="Enter Order ID">
    <button class="btn-pay" onclick="track()">Track Status</button>
    <div id="track-view" style="margin-top:20px;"></div>
</div>

<nav>
    <button class="nav-item active" id="n1" onclick="showPage('home')">🏠<br>Home</button>
    <button class="nav-item" id="n2" onclick="showPage('track-page')">📍<br>Track</button>
</nav>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzZiAtCiSXknefI9Qnnd01Ce_FtItvXyJ3hMpjV92MbKpb3rg4aAH9E9xy1b_Quz5tk/exec';
    
    const PRODUCTS = [
        { id: 1, name: 'Vlog Mic Pro', mrp: 999, price: 599, img: 'https://m.media-amazon.com/images/I/71Xmbe9Vp1L._SL1500_.jpg', colors: ['Black', 'Silver'] },
        { id: 2, name: '18" Ring Light', mrp: 1999, price: 1249, img: 'https://m.media-amazon.com/images/I/61NfT-jV9OL._SL1500_.jpg', colors: ['White', 'Warm'] },
        { id: 3, name: 'Flexi Tripod', mrp: 499, price: 299, img: 'https://m.media-amazon.com/images/I/41-pW8P72sL.jpg', colors: ['Red', 'Black'] }
    ];

    let cart = [];
    let selColor = "";

    function renderProducts(list = PRODUCTS) {
        document.getElementById('main-grid').innerHTML = list.map(p => {
            const off = Math.round(((p.mrp - p.price) / p.mrp) * 100);
            return `
            <div class="card" onclick="viewP(${p.id})">
                <img src="${p.img}">
                <div class="card-title">${p.name}</div>
                <div class="price-row">
                    <span class="p-off">-${off}%</span>
                    <span class="p-price">₹${p.price}</span>
                </div>
                <div class="p-mrp">M.R.P: ₹${p.mrp}</div>
            </div>`;
        }).join('');
    }

    function filter() {
        const q = document.getElementById('search-in').value.toLowerCase();
        const m = document.getElementById('p-range').value;
        document.getElementById('p-val').innerText = m;
        renderProducts(PRODUCTS.filter(p => p.name.toLowerCase().includes(q) && p.price <= m));
    }

    function viewP(id) {
        const p = PRODUCTS.find(x => x.id === id);
        selColor = p.colors[0];
        document.getElementById('info-content').innerHTML = `
            <center><img src="${p.img}" style="width:100%; max-height:200px; object-fit:contain;"></center>
            <h2 style="margin:10px 0;">${p.name}</h2>
            <div class="price-row" style="font-size:24px;"><span class="p-off">-${Math.round(((p.mrp-p.price)/p.mrp)*100)}%</span> <b>₹${p.price}</b></div>
            <div class="p-mrp">M.R.P: ₹${p.mrp}</div>
            <div class="badge">🚀 Prepaid Only</div> <div class="badge">✅ Guaranteed</div> <div class="badge">🔄 7 Days Return</div>
            <p>Select Color: <b id="sel-c-txt">${selColor}</b></p>
            <div>${p.colors.map(c => `<span class="color-opt" style="background:${c.toLowerCase()};" onclick="selColor='${c}'; document.getElementById('sel-c-txt').innerText='${c}';"></span>`).join('')}</div>
            <button class="btn-pay" onclick="addToCart(${p.id})">Add to Bag</button>
        `;
        showPage('info-page');
    }

    function addToCart(id) {
        const p = PRODUCTS.find(x => x.id === id);
        cart.push({...p, selectedColor: selColor});
        updateCart();
        alert("Bag mein add ho gaya!");
    }

    function updateCart() {
        document.getElementById('cart-count').innerText = cart.length;
        let total = 0, mrpSum = 0;
        document.getElementById('cart-list').innerHTML = cart.map((item, i) => {
            total += item.price; mrpSum += item.mrp;
            return `<div class="cart-item">
                <div><b>${item.name}</b><br><small>${item.selectedColor}</small></div>
                <b>₹${item.price}</b>
                <button onclick="cart.splice(${i},1); updateCart();" style="border:none; color:red; background:none;">X</button>
            </div>`;
        }).join('');
        document.getElementById('sum-mrp').innerText = "₹" + mrpSum;
        document.getElementById('sum-disc').innerText = "-₹" + (mrpSum - total);
        document.getElementById('sum-total').innerText = "₹" + total;
        document.getElementById('final-amt').innerText = total;
        document.getElementById('qr-code-img').src = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=upi://pay?pa=varun@upi&pn=Varun&am=${total}`;
    }

    async function finalizeOrder() {
        const ref = document.getElementById('u-ref').value;
        if(!ref) return alert("Please enter Payment Ref No!");
        
        showPage('success'); // Fast UI response
        const oid = "GC" + Math.floor(100000 + Math.random()*900000);
        document.getElementById('order-id-view').innerText = oid;
        document.getElementById('s-sound').play();

        const payload = {
            name: document.getElementById('u-name').value,
            phone: document.getElementById('u-phone').value,
            address: document.getElementById('u-addr').value,
            payment: ref,
            price: document.getElementById('sum-total').innerText,
            product: cart.map(c => c.name + " (" + c.selectedColor + ")").join(", "),
            orderId: oid
        };
        fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
    }

    async function track() {
        const id = document.getElementById('track-id').value;
        const view = document.getElementById('track-view');
        view.innerHTML = '<div class="loader"></div>';
        const res = await fetch(`${SCRIPT_URL}?mode=track&id=${id}`);
        const data = await res.json();
        
        let replace = "";
        if(data.status === "delivered" && data.deliveryDate) {
            const diff = Math.ceil((new Date() - new Date(data.deliveryDate)) / (1000*60*60*24));
            if(diff <= 7) replace = `<button class="btn-pay" onclick="reqRep('${id}')">🔄 Request Replacement</button>`;
        }
        
        view.innerHTML = `<div style="background:white; padding:15px; border-radius:10px; border-left:5px solid var(--primary);">
            <p>ID: #${id}</p>
            <p>Status: <b style="color:var(--success);">${data.status}</b></p>
            ${replace}
        </div>`;
    }

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        window.scrollTo(0,0);
    }

    renderProducts();
</script>
</body>
</html>
