<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Varun Store</title>
    <style>
        :root { --accent: #e91e63; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background: var(--bg); padding-bottom: 80px; }
        header { background: #fff; padding: 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 20px; font-weight: bold; color: var(--accent); }
        .search-area { background: #fff; padding: 10px; position: sticky; top: 54px; z-index: 90; border-bottom: 1px solid #eee; }
        .filter-chips { display: flex; gap: 8px; overflow-x: auto; padding: 5px 0; scrollbar-width: none; }
        .chip { padding: 6px 15px; background: #fff; border: 1px solid #ddd; border-radius: 20px; font-size: 12px; cursor: pointer; white-space: nowrap; }
        .chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }
        .container { padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .p-card { background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.06); text-align: center; cursor: pointer; }
        .p-img { width: 100%; height: 140px; object-fit: cover; }
        .p-info { padding: 10px; }
        .p-name { font-size: 14px; font-weight: 600; margin: 5px 0; }
        .p-price { color: var(--accent); font-weight: bold; }
        .modal { position: fixed; inset: 0; background: #fff; z-index: 3000; display: none; flex-direction: column; overflow-y: auto; }
        .modal-header { padding: 15px; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 15px; }
        .color-dot { width: 35px; height: 35px; border-radius: 50%; display: inline-block; margin-right: 12px; border: 2px solid #ddd; cursor: pointer; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: flex-end; z-index: 2000; }
        .overlay-content { background: #fff; width: 100%; max-height: 85vh; border-radius: 20px 20px 0 0; padding: 20px; overflow-y: auto; box-sizing: border-box; }
        .btn-main { background: var(--accent); color: #fff; border: none; padding: 15px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        nav { position: fixed; bottom: 0; width: 100%; background: #fff; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #ddd; }
    </style>
</head>
<body>

<header>
    <div class="logo">Varun Store</div>
    <div onclick="openCart()" style="cursor:pointer;">🛒 <span id="cart-count">0</span></div>
</header>

<div class="search-area">
    <div class="filter-chips">
        <div class="chip active" onclick="applyFilter('all', this)">All</div>
        <div class="chip" onclick="applyFilter('99', this)">Under 99</div>
        <div class="chip" onclick="applyFilter('149', this)">Under 149</div>
        <div class="chip" onclick="applyFilter('199', this)">Under 199</div>
        <div class="chip" onclick="applyFilter('499', this)">Under 499</div>
    </div>
</div>

<div id="product-list" class="container"></div>

<div id="product-modal" class="modal">
    <div class="modal-header"><span onclick="closeModal()" style="font-size:25px; cursor:pointer;">←</span> <b>Product Details</b></div>
    <div id="modal-content" style="padding:15px;"></div>
</div>

<div id="main-overlay" class="overlay">
    <div class="overlay-content" id="overlay-body"></div>
</div>

<nav>
    <div onclick="location.reload()">🏠<br>Home</div>
    <div onclick="openCart()">🛒<br>Bag</div>
</nav>

<script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbxfoHDe7kKojTS6b_u0fkG_rrgliVXSDBeQnltEo5Xi8QNL7QDopaGNSGPSFn5neujG/exec";
    const upiID = "varungoyal7910@pnb";
    
    const products = [
        { id: 1, name: "Premium Silicone Case", price: 149, mrp: 499, img: "https://via.placeholder.com/150", desc: "Super soft matte finish silicone case.", colors: ["Black", "Blue", "Red"] },
        { id: 2, name: "M10 Wireless Earbuds", price: 499, mrp: 999, img: "https://via.placeholder.com/150", desc: "Digital display earbuds with power bank.", colors: ["Black", "White"] }
    ];

    let cart = [], selectedColor = "", userData = {};

    function renderProducts(data = products) {
        document.getElementById('product-list').innerHTML = data.map(p => `
            <div class="p-card" onclick="openProduct(${p.id})">
                <img src="${p.img}" class="p-img">
                <div class="p-info">
                    <div class="p-name">${p.name}</div>
                    <div class="p-price">₹${p.price} <small style="text-decoration:line-through; color:gray;">₹${p.mrp}</small></div>
                </div>
            </div>`).join('');
    }
    renderProducts();

    function openProduct(id) {
        const p = products.find(x => x.id === id);
        selectedColor = "";
        document.getElementById('product-modal').style.display = 'flex';
        document.getElementById('modal-content').innerHTML = `
            <img src="${p.img}" style="width:100%; border-radius:10px;">
            <h2>${p.name}</h2>
            <p>${p.desc}</p>
            <h4>Select Color:</h4>
            ${p.colors.map(c => `<div class="color-dot" style="background:${c.toLowerCase()};" onclick="selectColor('${c}', this)"></div>`).join('')}
            <button class="btn-main" onclick="addToCart(${p.id})">Add to Bag</button>
        `;
    }

    function selectColor(color, el) {
        selectedColor = color;
        document.querySelectorAll('.color-dot').forEach(d => d.style.border = "2px solid #ddd");
        el.style.border = "3px solid black";
    }

    function addToCart(id) {
        const p = products.find(x => x.id === id);
        if(!selectedColor) return alert("Pehle Color select karein!");
        cart.push({...p, color: selectedColor, qty: 1});
        document.getElementById('cart-count').innerText = cart.length;
        closeModal(); openCart();
    }

    function closeModal() { document.getElementById('product-modal').style.display = 'none'; }

    function openCart() {
        document.getElementById('main-overlay').style.display = 'flex';
        let total = cart.reduce((a,b) => a + b.price, 0);
        document.getElementById('overlay-body').innerHTML = `<h3>My Bag</h3>` + 
            cart.map(i => `<p>${i.name} (${i.color}) - ₹${i.price}</p>`).join('') + 
            `<h4>Total: ₹${total}</h4><button class="btn-main" onclick="openAddress(${total})">Place Order</button>`;
    }

    function openAddress(total) {
        document.getElementById('overlay-body').innerHTML = `
            <h3>Shipping Info</h3>
            <input type="text" id="name" placeholder="Name">
            <input type="text" id="phone" placeholder="Phone Number">
            <input type="text" id="addr" placeholder="Full Address">
            <input type="text" id="pin" placeholder="Pincode">
            <button class="btn-main" onclick="saveAddress(${total})">Payment</button>`;
    }

    function saveAddress(t) {
        userData = { name: document.getElementById('name').value, phone: document.getElementById('phone').value, addr: document.getElementById('addr').value, pin: document.getElementById('pin').value };
        if(!userData.name || !userData.phone) return alert("Details fill karein!");
        openPayment(t);
    }

    function openPayment(total) {
        document.getElementById('overlay-body').innerHTML = `
            <div style="text-align:center;">
                <p style="color:red; font-weight:bold;">Timer: <span id="timer">02:00</span></p>
                <h3>Pay ₹${total}</h3>
                <p>UPI ID: ${upiID}</p>
                <input type="text" id="ref" placeholder="Enter Transaction ID (UTR)">
                <button class="btn-main" onclick="confirmOrder(${total})">Confirm Payment</button>
            </div>`;
        let time = 120;
        let timer = setInterval(() => {
            let m = Math.floor(time/60), s = time%60;
            if(document.getElementById('timer')) document.getElementById('timer').innerText = `${m}:${s<10?'0':''}${s}`;
            if(--time < 0) { clearInterval(timer); location.reload(); }
        }, 1000);
    }

    async function confirmOrder(total) {
        const ref = document.getElementById('ref').value;
        if(!ref) return alert("Ref ID zaruri hai!");
        const details = cart.map(i => `${i.name} (${i.color})`).join(", ");
        const final = { 
            name: userData.name, 
            phone: userData.phone, 
            addr: userData.addr, 
            pin: userData.pin, 
            payRef: ref, 
            total: total, 
            date: new Date().toLocaleString('en-IN'), 
            orderID: "VAR" + Date.now().toString().slice(-6),
            orderDetails: details 
        };
        
        document.getElementById('overlay-body').innerHTML = "<h4>Booking Order...</h4>";
        await fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(final) });
        alert("Order Successful! ID: " + final.orderID);
        location.reload();
    }

    function applyFilter(type, el) {
        document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        let res = products;
        if(type !== 'all') res = products.filter(p => p.price <= parseInt(type));
        renderProducts(res);
    }
</script>
</body>
</html>
