<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Varun Store</title>
    <style>
        :root { --accent: #e91e63; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); padding-bottom: 80px; }
        
        /* Header */
        header { background: #fff; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 20px; font-weight: bold; color: var(--accent); }
        .cart-icon { font-size: 24px; cursor: pointer; position: relative; }
        .cart-count { position: absolute; top: -5px; right: -10px; background: red; color: #fff; font-size: 11px; padding: 2px 5px; border-radius: 50%; }

        /* Filters */
        .search-area { background: #fff; padding: 10px; position: sticky; top: 54px; z-index: 90; border-bottom: 1px solid #eee; }
        .filter-chips { display: flex; gap: 8px; overflow-x: auto; padding: 5px 0; scrollbar-width: none; }
        .chip { padding: 6px 15px; background: #fff; border: 1px solid #ddd; border-radius: 20px; font-size: 12px; cursor: pointer; white-space: nowrap; }
        .chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }

        /* Product Grid */
        .container { padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .p-card { background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.06); text-align: center; cursor: pointer; }
        .p-img { width: 100%; height: 140px; object-fit: cover; }
        .p-info { padding: 10px; }
        .p-name { font-size: 14px; font-weight: 600; margin: 5px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .p-price { color: var(--accent); font-weight: bold; }

        /* Modal & Overlays */
        .modal { position: fixed; inset: 0; background: #fff; z-index: 3000; display: none; flex-direction: column; overflow-y: auto; }
        .modal-header { padding: 15px; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 15px; position: sticky; top: 0; background: #fff; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: flex-end; z-index: 2000; }
        .overlay-content { background: #fff; width: 100%; max-height: 85vh; border-radius: 20px 20px 0 0; padding: 20px; overflow-y: auto; box-sizing: border-box; }

        /* Cart UI */
        .cart-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .qty-btn { background: #eee; border: none; width: 25px; height: 25px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        
        .btn-main { background: var(--accent); color: #fff; border: none; padding: 15px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        
        /* Bottom Nav */
        nav { position: fixed; bottom: 0; width: 100%; background: #fff; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #ddd; z-index: 1000; }
        .nav-item { text-align: center; font-size: 11px; color: #666; cursor: pointer; flex: 1; }
        .nav-item.active { color: var(--accent); font-weight: bold; }
        .color-dot { width: 35px; height: 35px; border-radius: 50%; display: inline-block; margin-right: 12px; border: 2px solid #ddd; cursor: pointer; }
        
        .page { display: none; }
        .page.active { display: block; }
    </style>
</head>
<body>

<header>
    <div class="logo">Varun Store</div>
    <div class="cart-icon" onclick="openCart()">🛒 <span class="cart-count" id="cart-count">0</span></div>
</header>

<!-- HOME PAGE -->
<div id="home-page" class="page active">
    <div class="search-area">
        <div class="filter-chips">
            <div class="chip active" onclick="applyFilter('all', this)">All Items</div>
            <div class="chip" onclick="applyFilter('149', this)">Under 149</div>
            <div class="chip" onclick="applyFilter('499', this)">Under 499</div>
        </div>
    </div>
    <div id="product-list" class="container"></div>
</div>

<!-- ORDERS PAGE -->
<div id="orders-page" class="page" style="padding: 20px;">
    <h3>My Orders</h3>
    <div id="my-orders-list">No orders yet.</div>
</div>

<!-- TRACK PAGE -->
<div id="track-page" class="page" style="padding: 20px;">
    <h3>Track Order</h3>
    <input type="text" id="track-id" placeholder="Enter Order ID">
    <button class="btn-main" onclick="alert('Tracking system coming soon!')">Search</button>
</div>

<!-- Product Detail Modal -->
<div id="product-modal" class="modal">
    <div class="modal-header"><span onclick="closeModal()" style="font-size:25px;">←</span> <b>Details</b></div>
    <div id="modal-content" style="padding:15px;"></div>
</div>

<!-- Cart/Checkout Overlay -->
<div id="main-overlay" class="overlay">
    <div class="overlay-content" id="overlay-body"></div>
</div>

<nav>
    <div class="nav-item active" onclick="showPage('home', this)">🏠<br>Home</div>
    <div class="nav-item" onclick="showPage('orders', this)">📋<br>My Orders</div>
    <div class="nav-item" onclick="showPage('track', this)">🚚<br>Tracking</div>
</nav>

<script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbxfoHDe7kKojTS6_u0fkG_rrgliVXSDBeQnltEo5Xi8QNL7QDopaGNSGPSFn5neujG/exec";
    const upiID = "varungoyal7910@pnb";
    
    const products = [
        { id: 1, name: "Matte Case", price: 149, mrp: 499, img: "https://via.placeholder.com/150", colors: ["Black", "MidnightBlue", "Red"] },
        { id: 2, name: "M10 Buds", price: 499, mrp: 999, img: "https://via.placeholder.com/150", colors: ["Black", "White"] }
    ];

    let cart = [], selectedColor = "", userData = {};

    function renderProducts(data = products) {
        document.getElementById('product-list').innerHTML = data.map(p => `
            <div class="p-card" onclick="openProduct(${p.id})">
                <img src="${p.img}" class="p-img">
                <div class="p-info">
                    <div class="p-name">${p.name}</div>
                    <div class="p-price">₹${p.price} <small style="text-decoration:line-through; color:gray;">₹${p.mrp}</small></div>
                </div>
            </div>`).join('');
    }
    renderProducts();

    function openProduct(id) {
        const p = products.find(x => x.id === id);
        selectedColor = "";
        document.getElementById('product-modal').style.display = 'flex';
        document.getElementById('modal-content').innerHTML = `
            <img src="${p.img}" style="width:100%; border-radius:10px;">
            <h2>${p.name}</h2>
            <p>Premium quality product with 7-days replacement policy.</p>
            <h4>Choose Color:</h4>
            ${p.colors.map(c => `<div class="color-dot" style="background:${c.toLowerCase()};" onclick="selectColor('${c}', this)"></div>`).join('')}
            <button class="btn-main" onclick="addToCart(${p.id})">Add to Bag</button>
        `;
    }

    function selectColor(color, el) {
        selectedColor = color;
        document.querySelectorAll('.color-dot').forEach(d => d.style.border = "2px solid #ddd");
        el.style.border = "3px solid black";
    }

    function addToCart(id) {
        const p = products.find(x => x.id === id);
        if(!selectedColor) return alert("Pehle color select karein!");
        
        let existing = cart.find(i => i.id === id && i.color === selectedColor);
        if(existing) existing.qty++;
        else cart.push({...p, color: selectedColor, qty: 1});
        
        updateUI();
        closeModal();
        alert("Bag mein add ho gaya!");
    }

    function updateUI() {
        document.getElementById('cart-count').innerText = cart.reduce((a,b) => a + b.qty, 0);
    }

    function openCart() {
        document.getElementById('main-overlay').style.display = 'flex';
        const body = document.getElementById('overlay-body');
        if(cart.length === 0) { body.innerHTML = "<h3>Bag Khali Hai</h3>"; return; }
        
        let total = cart.reduce((a,b) => a + (b.price * b.qty), 0);
        body.innerHTML = `<h3>My Bag</h3>` + cart.map((i, index) => `
            <div class="cart-item">
                <div><b>${i.name}</b><br><small>${i.color}</small></div>
                <div>
                    <button class="qty-btn" onclick="changeQty(${index}, -1)">-</button>
                    <span style="margin:0 10px;">${i.qty}</span>
                    <button class="qty-btn" onclick="changeQty(${index}, 1)">+</button>
                </div>
                <b>₹${i.price * i.qty}</b>
            </div>`).join('') + `<h4>Total: ₹${total}</h4><button class="btn-main" onclick="openAddress(${total})">Proceed to Checkout</button>`;
    }

    function changeQty(index, delta) {
        cart[index].qty += delta;
        if(cart[index].qty <= 0) cart.splice(index, 1);
        updateUI();
        openCart();
    }

    function openAddress(total) {
        document.getElementById('overlay-body').innerHTML = `
            <h3>Shipping Details</h3>
            <input type="text" id="name" placeholder="Name">
            <input type="text" id="phone" placeholder="Phone">
            <input type="text" id="addr" placeholder="Full Address">
            <input type="text" id="pin" placeholder="Pincode">
            <button class="btn-main" onclick="saveAddress(${total})">Confirm & Pay</button>`;
    }

    function saveAddress(t) {
        userData = { name: document.getElementById('name').value, phone: document.getElementById('phone').value, addr: document.getElementById('addr').value, pin: document.getElementById('pin').value };
        if(!userData.name || !userData.phone) return alert("Fill all info!");
        openPayment(t);
    }

    function openPayment(total) {
        document.getElementById('overlay-body').innerHTML = `
            <div style="text-align:center;">
                <p style="color:red;">Time: <span id="timer">02:00</span></p>
                <h3>Pay ₹${total}</h3>
                <p>UPI: ${upiID}</p>
                <input type="text" id="ref" placeholder="UTR Number">
                <button class="btn-main" onclick="confirmOrder(${total})">Complete Order</button>
            </div>`;
        let time = 120;
        let t = setInterval(() => {
            let m = Math.floor(time/60), s = time%60;
            if(document.getElementById('timer')) document.getElementById('timer').innerText = `${m}:${s<10?'0':''}${s}`;
            if(--time < 0) { clearInterval(t); location.reload(); }
        }, 1000);
    }

    async function confirmOrder(total) {
        const ref = document.getElementById('ref').value;
        if(!ref) return alert("Enter UTR!");
        
        const details = cart.map(i => `${i.name} (${i.color}) x${i.qty}`).join(", ");
        const orderID = "VAR" + Date.now().toString().slice(-6);
        const date = new Date().toLocaleString('en-IN');
        
        const final = { ...userData, total, payRef: ref, orderID, orderDetails: details, date };
        
        // Save to My Orders (Local Storage)
        let myOrders = JSON.parse(localStorage.getItem('myOrders') || '[]');
        myOrders.push({ id: orderID, date: date, total: total, items: details });
        localStorage.setItem('myOrders', JSON.stringify(myOrders));

        document.getElementById('overlay-body').innerHTML = "<h4>Processing...</h4>";
        await fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(final) });
        
        alert("Order Success! ID: " + orderID);
        cart = []; updateUI();
        location.reload();
    }

    function showPage(pageId, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId + '-page').classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');

        if(pageId === 'orders') {
            let orders = JSON.parse(localStorage.getItem('myOrders') || '[]');
            document.getElementById('my-orders-list').innerHTML = orders.length ? orders.map(o => `
                <div style="background:#fff; padding:10px; border-radius:8px; margin-bottom:10px; border-left:4px solid var(--accent);">
                    <b>ID: ${o.id}</b><br><small>${o.date}</small><br>
                    <span>${o.items}</span><br><b>Total: ₹${o.total}</b>
                </div>`).join('') : "No orders found.";
        }
    }

    function closeModal() { document.getElementById('product-modal').style.display = 'none'; }
    function applyFilter(type, el) {
        document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        renderProducts(type === 'all' ? products : products.filter(p => p.price <= parseInt(type)));
    }
</script>
</body>
</html>
