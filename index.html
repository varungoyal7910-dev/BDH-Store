<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Varun Store | Vlogging Hub</title>
    <style>
        :root { --accent: #e91e63; --bg: #f4f7f6; --text: #333; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: var(--text); padding-bottom: 80px; }
        
        header { background: #fff; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 1000; }
        .logo-text { font-size: 18px; font-weight: bold; color: var(--accent); }
        .cart-icon { font-size: 24px; cursor: pointer; position: relative; }
        .cart-count { position: absolute; top: -5px; right: -10px; background: #000; color: #fff; font-size: 10px; padding: 2px 6px; border-radius: 50%; }

        .container { padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .p-card { background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #eee; }
        .p-img { width: 100%; height: 150px; object-fit: cover; }
        .p-info { padding: 10px; text-align: center; }

        .modal, .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: flex-end; z-index: 2000; }
        .modal-content, .overlay-content { background: #fff; width: 100%; max-width: 500px; border-radius: 20px 20px 0 0; padding: 25px; box-sizing: border-box; }
        
        input { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        .btn-main { background: var(--accent); color: #fff; border: none; padding: 18px; border-radius: 10px; width: 100%; font-weight: bold; font-size: 16px; cursor: pointer; }
        
        /* Navigation Bottom Bar */
        nav { position: fixed; bottom: 0; width: 100%; background: #fff; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #ddd; z-index: 1000; }
        .nav-item { text-align: center; font-size: 12px; color: #888; flex: 1; cursor: pointer; }
        .nav-item.active { color: var(--accent); font-weight: bold; }

        /* Track Order Styling */
        .status-box { background: #f9f9f9; padding: 15px; border-radius: 10px; margin-top: 10px; border-left: 5px solid var(--accent); }
    </style>
</head>
<body>

<header>
    <div class="logo-text">VARUN STORE</div>
    <div class="cart-icon" onclick="openCart()">🛍️ <span class="cart-count" id="cart-count">0</span></div>
</header>

<div id="home-page" class="container">
    <!-- Products automatic load honge -->
</div>

<!-- Modal Screens -->
<div id="main-modal" class="modal">
    <div class="modal-content" id="modal-body"></div>
</div>

<nav>
    <div class="nav-item active" onclick="location.reload()">🏠<br>Home</div>
    <div class="nav-item" onclick="showTrackSystem()">📍<br>Track Order</div>
    <div class="nav-item" onclick="alert('Support: @varungoyal7910')">💬<br>Help</div>
</nav>

<script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbxfoHDe7kKojTS6b_u0fkG_rrgliVXSDBeQnltEo5Xi8QNL7QDopaGNSGPSFn5neujG/exec";
    
    const products = [
        { id: 1, name: "Premium RGB Mouse", price: 298, img: "https://images.unsplash.com/photo-1527443224154-c4a3942d3acf?w=500" },
        { id: 2, name: "Wireless Earbuds", price: 499, img: "https://images.unsplash.com/photo-1590658268037-6bf12165a8df?w=500" }
    ];

    let cart = [];

    // Load Home
    function init() {
        document.getElementById('home-page').innerHTML = products.map(p => `
            <div class="p-card" onclick="addToCart(${p.id})">
                <img src="${p.img}" class="p-img">
                <div class="p-info">
                    <b>${p.name}</b><br>
                    <span style="color:var(--accent)">₹${p.price}</span>
                </div>
            </div>`).join('');
    }

    function addToCart(id) {
        const p = products.find(x => x.id === id);
        cart.push(p);
        document.getElementById('cart-count').innerText = cart.length;
        alert(p.name + " Bag mein daal diya hai!");
    }

    function openCart() {
        if(cart.length === 0) return alert("Cart khali hai!");
        let total = cart.reduce((a,b) => a + b.price, 0);
        showModal(`
            <h3>Your Cart</h3>
            ${cart.map(i => `<p>${i.name} - ₹${i.price}</p>`).join('')}
            <hr>
            <h4>Total: ₹${total}</h4>
            <button class="btn-main" onclick="checkoutStep1(${total})">Checkout Now</button>
        `);
    }

    function checkoutStep1(total) {
        showModal(`
            <h3>Delivery Details</h3>
            <input type="text" id="c-name" placeholder="Name">
            <input type="number" id="c-phone" placeholder="Phone">
            <button class="btn-main" onclick="checkoutStep2(${total})">Next</button>
        `);
    }

    function checkoutStep2(total) {
        const qr = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=upi://pay?pa=varungoyal7910@pnb%26am=${total}`;
        showModal(`
            <center>
                <h3>Pay ₹${total}</h3>
                <img src="${qr}" style="width:180px;">
                <p>UPI ID: varungoyal7910@pnb</p>
                <input type="number" id="utr" placeholder="Enter 12-digit UTR">
                <button class="btn-main" id="conf-btn" onclick="finalize()">Confirm Order</button>
            </center>
        `);
    }

    async function finalize() {
        const btn = document.getElementById('conf-btn');
        btn.innerText = "Processing... Wait";
        btn.disabled = true;

        const orderID = "VAR" + Math.floor(Math.random()*9000 + 1000);
        
        // Data to save
        const data = { orderID, utr: document.getElementById('utr').value };

        try {
            await fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
            alert("Success! Order ID: " + orderID);
            localStorage.setItem('lastOrder', orderID); // Track ke liye save kar liya
            location.reload();
        } catch(e) {
            alert("Error!");
            btn.disabled = false;
        }
    }

    // --- TRACK ORDER SYSTEM ---
    function showTrackSystem() {
        const lastID = localStorage.getItem('lastOrder') || "Example: VAR1234";
        showModal(`
            <h3>Track Your Order</h3>
            <p>Enter your Order ID to check status:</p>
            <input type="text" id="track-id" value="${lastID}">
            <button class="btn-main" onclick="trackNow()">Track Now</button>
            <div id="status-result"></div>
        `);
    }

    function trackNow() {
        const id = document.getElementById('track-id').value;
        const res = document.getElementById('status-result');
        res.innerHTML = `<div class="status-box"><b>Status:</b> 📦 Order Confirmed<br><small>Checking payment for ${id}...</small></div>`;
    }

    function showModal(html) {
        const m = document.getElementById('main-modal');
        document.getElementById('modal-body').innerHTML = html + `<button onclick="closeModal()" style="background:none; border:none; color:blue; margin-top:15px; width:100%;">← Back to Shop</button>`;
        m.style.display = 'flex';
    }

    function closeModal() { document.getElementById('main-modal').style.display = 'none'; }

    init();
</script>
</body>
</html>
