<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GOCART | Premium Store</title>
    <style>
        :root { --g-orange: #FFB400; --g-navy: #131921; --g-white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f4f4f4; padding-bottom: 80px; }
        
        /* HEADER */
        header { background: var(--g-navy); padding: 15px; color: white; position: sticky; top: 0; z-index: 1000; }
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .logo { font-size: 24px; font-weight: 900; }
        .logo span { color: var(--g-orange); }
        .cart-btn { background: var(--g-orange); color: var(--g-navy); padding: 5px 12px; border-radius: 5px; font-weight: bold; cursor: pointer; }

        .search-container { background: white; border-radius: 5px; display: flex; overflow: hidden; margin-bottom: 10px; }
        .search-container input { border: none; padding: 12px; width: 100%; outline: none; font-size: 14px; }
        .search-container button { background: var(--g-orange); border: none; padding: 0 15px; }

        .filters { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; padding: 5px 0; }
        .chip { background: rgba(255,255,255,0.1); border: 1px solid #444; padding: 6px 15px; border-radius: 20px; font-size: 11px; white-space: nowrap; color: white; cursor: pointer; }

        /* TRUST BAR - Filters ke niche */
        .trust-bar { display: flex; justify-content: space-around; background: #fff; padding: 10px; font-size: 11px; font-weight: bold; color: #555; border-bottom: 1px solid #ddd; }

        /* PAGES */
        .page { display: none; padding: 15px; min-height: 80vh; }
        .active-page { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from {opacity:0} to {opacity:1} }

        /* PRODUCT GRID */
        .p-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px 0; }
        .p-card { background: white; border-radius: 10px; padding: 12px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .p-card img { width: 100%; height: 120px; object-fit: contain; }

        .btn-main { background: var(--g-orange); color: white; border: none; width: 100%; padding: 15px; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .form-input { width: 100%; padding: 14px; margin-bottom: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        
        nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #ddd; padding: 12px 0; z-index: 1000; }
        .nav-item { flex: 1; text-align: center; font-size: 11px; color: #666; font-weight: bold; cursor: pointer; }
        .nav-item.active { color: var(--g-orange); }
    </style>
</head>
<body>

<header>
    <div class="header-top">
        <div class="logo">GO<span>CART</span></div>
        <div class="cart-btn" onclick="showPage('cart-page')">🛒 Cart (<span id="cart-count">0</span>)</div>
    </div>
    <div class="search-container">
        <input type="text" id="search-input" placeholder="Search products..." onkeyup="searchFun()">
        <button onclick="searchFun()">🔍</button>
    </div>
    <div class="filters">
        <div class="chip" onclick="filterPrice('All')">All Items</div>
        <div class="chip" onclick="filterPrice(199)">Under ₹199</div>
        <div class="chip" onclick="filterPrice(499)">Under ₹499</div>
    </div>
</header>

<div class="trust-bar">
    <span>🛡️ Granted Product</span>
    <span>🚚 Free Delivery</span>
    <span>🔄 7 Day Return</span>
</div>

<!-- HOME PAGE -->
<div id="home-page" class="page active-page">
    <div class="p-grid" id="p-container">
        <!-- Products -->
        <div class="p-card" data-price="99" onclick="openDetails('Premium Vlog Mic', 99, 499, 'https://m.media-amazon.com/images/I/71Xmbe9Vp1L._SL1500_.jpg')">
            <img src="https://m.media-amazon.com/images/I/71Xmbe9Vp1L._SL1500_.jpg">
            <h4 style="font-size:12px; margin:8px 0;">Premium Vlog Mic</h4>
            <div style="color:#B12704; font-weight:bold;">₹99</div>
        </div>
        <div class="p-card" data-price="299" onclick="openDetails('Wireless Mouse', 299, 899, 'https://m.media-amazon.com/images/I/61UxfXTzKaL._SL1500_.jpg')">
            <img src="https://m.media-amazon.com/images/I/61UxfXTzKaL._SL1500_.jpg">
            <h4 style="font-size:12px; margin:8px 0;">Wireless Mouse</h4>
            <div style="color:#B12704; font-weight:bold;">₹299</div>
        </div>
    </div>
</div>

<!-- PRODUCT DETAILS -->
<div id="details-page" class="page" style="background:white; padding:0;">
    <div style="padding:20px;">
        <center><img id="det-img" src="" style="width:80%; max-height:250px; object-fit:contain;"></center>
        <h2 id="det-title"></h2>
        <div style="margin-bottom:15px;">
            <span style="font-size:24px; color:#B12704; font-weight:bold;" id="det-price"></span>
            <span style="text-decoration:line-through; color:#888; margin-left:10px;" id="det-old"></span>
        </div>
        <button class="btn-main" onclick="addToCart()">Add to Cart 🛒</button>
        <p style="text-align:center; color:#666; font-size:12px; margin-top:10px;">(Check details in Cart to Buy)</p>
    </div>
</div>

<!-- CART PAGE -->
<div id="cart-page" class="page">
    <h3>Your Cart 🛒</h3>
    <div id="cart-items" style="background:white; padding:15px; border-radius:10px; margin-bottom:15px;">
        <p style="color:#888;">Cart is empty!</p>
    </div>
    <button class="btn-main" id="checkout-btn" onclick="showPage('checkout-page')" style="display:none;">Proceed to Checkout</button>
</div>

<!-- CHECKOUT PAGE -->
<div id="checkout-page" class="page">
    <h3>Delivery Details</h3>
    <input type="text" id="u-name" class="form-input" placeholder="Full Name">
    <input type="tel" id="u-phone" class="form-input" placeholder="Phone Number">
    <input type="text" id="u-addr" class="form-input" placeholder="Full Address">
    <button class="btn-main" onclick="showPage('payment-page')">Go to Payment</button>
</div>

<!-- PAYMENT PAGE -->
<div id="payment-page" class="page" style="text-align:center;">
    <h3>Pay & Confirm</h3>
    <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=upi://pay?pa=varungoyal7910@pnb" style="width:200px;">
    <input type="text" id="u-utr" class="form-input" placeholder="Enter UTR/Transaction ID" style="margin-top:20px;">
    <button class="btn-main" onclick="confirmOrder()">Confirm Order</button>
</div>

<!-- MY ORDERS & TRACK -->
<div id="orders-page" class="page"><h3>My Orders</h3><div id="orders-list"></div></div>
<div id="track-page" class="page">
    <h3>Track</h3>
    <input type="text" id="track-input" class="form-input" placeholder="Order ID">
    <button class="btn-main" onclick="runTrack()">Track Status</button>
    <div id="track-res" style="margin-top:15px;"></div>
</div>

<nav>
    <div class="nav-item" onclick="showPage('home-page')">🏠<br>Home</div>
    <div class="nav-item" onclick="loadOrders()">📦<br>Orders</div>
    <div class="nav-item" onclick="showPage('track-page')">📍<br>Track</div>
</nav>

<script>
    let cart = [];
    let currentProd = {};
    let myOrders = JSON.parse(localStorage.getItem('gocart_orders')) || [];

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.getElementById(id).classList.add('active-page');
        window.scrollTo(0,0);
    }

    function openDetails(t, p, o, i) {
        currentProd = {title: t, price: p, img: i};
        document.getElementById('det-title').innerText = t;
        document.getElementById('det-price').innerText = "₹" + p;
        document.getElementById('det-old').innerText = "₹" + o;
        document.getElementById('det-img').src = i;
        showPage('details-page');
    }

    function addToCart() {
        cart.push(currentProd);
        document.getElementById('cart-count').innerText = cart.length;
        updateCartUI();
        alert("Added to Cart!");
        showPage('home-page');
    }

    function updateCartUI() {
        const container = document.getElementById('cart-items');
        if(cart.length == 0) return;
        container.innerHTML = cart.map(i => `<div style="display:flex; justify-content:space-between; margin-bottom:10px;">
            <span>${i.title}</span><b>₹${i.price}</b>
        </div>`).join('');
        document.getElementById('checkout-btn').style.display = 'block';
    }

    function filterPrice(limit) {
        let cards = document.getElementsByClassName('p-card');
        for (let card of cards) {
            let p = parseInt(card.getAttribute('data-price'));
            if(limit === 'All') card.style.display = "block";
            else card.style.display = (p <= limit) ? "block" : "none";
        }
    }

    function searchFun() {
        let input = document.getElementById('search-input').value.toLowerCase();
        let cards = document.getElementsByClassName('p-card');
        for (let card of cards) {
            let title = card.getElementsByTagName('h4')[0].innerText.toLowerCase();
            card.style.display = title.includes(input) ? "block" : "none";
        }
    }

    async function confirmOrder() {
        const orderId = "VAR" + Math.floor(1000 + Math.random() * 9000);
        const data = { orderId, status: "Pending", items: cart.map(i => i.title).join(',') };
        myOrders.push(data);
        localStorage.setItem('gocart_orders', JSON.stringify(myOrders));
        alert("Order Success! ID: " + orderId);
        location.reload();
    }

    function loadOrders() {
        document.getElementById('orders-list').innerHTML = myOrders.map(o => `<div style="background:white; padding:10px; margin-bottom:10px; border-radius:5px;">ID: ${o.orderId} - ${o.status}</div>`).join('');
        showPage('orders-page');
    }

    function runTrack() {
        const id = document.getElementById('track-input').value;
        const found = myOrders.find(o => o.orderId == id);
        document.getElementById('track-res').innerText = found ? "Status: " + found.status : "Not Found";
    }
</script>
</body>
</html>
