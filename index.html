<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Varun Store | Vlogging Hub</title>
    <style>
        :root { --accent: #e91e63; --bg: #f4f7f6; --text: #333; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: var(--text); padding-bottom: 75px; }
        
        header { background: #fff; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 1000; }
        .logo-text { font-size: 18px; font-weight: bold; color: var(--accent); }
        .cart-icon { font-size: 24px; cursor: pointer; position: relative; }
        .cart-count { position: absolute; top: -5px; right: -10px; background: #000; color: #fff; font-size: 10px; padding: 2px 6px; border-radius: 50%; }

        .page { display: none; padding: 20px; min-height: 80vh; animation: fadeIn 0.3s ease; }
        .active-page { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .p-card { background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #eee; cursor: pointer; }
        .p-img { width: 100%; height: 150px; object-fit: cover; }
        .p-info { padding: 10px; text-align: center; }

        input, textarea { width: 100%; padding: 15px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        .btn-main { background: var(--accent); color: #fff; border: none; padding: 18px; border-radius: 10px; width: 100%; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 10px; }
        
        nav { position: fixed; bottom: 0; width: 100%; background: #fff; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #ddd; z-index: 1000; }
        .nav-item { text-align: center; font-size: 10px; color: #888; flex: 1; cursor: pointer; }
        .nav-item.active { color: var(--accent); font-weight: bold; }

        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: #fff; margin-bottom: 10px; border-radius: 10px; }
        .qty-btn { background: #eee; border: none; padding: 5px 12px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .info-card { background: #fff; padding: 20px; border-radius: 15px; margin-bottom: 15px; border-left: 5px solid var(--accent); }
    </style>
</head>
<body>

<header>
    <div class="logo-text">VARUN STORE</div>
    <div class="cart-icon" onclick="showPage('cart-page')">🛒 <span class="cart-count" id="cart-count">0</span></div>
</header>

<!-- PAGES -->
<div id="home-page" class="page active-page">
    <div class="product-grid" id="product-list"></div>
</div>

<div id="cart-page" class="page">
    <h2>Your Cart</h2>
    <div id="cart-items-list"></div>
    <div id="cart-summary"></div>
</div>

<div id="checkout-page" class="page">
    <h2>Delivery Details</h2>
    <input type="text" id="u-name" placeholder="Full Name">
    <input type="number" id="u-phone" placeholder="Phone Number">
    <textarea id="u-address" rows="3" placeholder="Full Address"></textarea>
    <input type="number" id="u-pincode" placeholder="Pincode">
    <button class="btn-main" onclick="goToPayment()">Next: Payment</button>
</div>

<div id="track-page" class="page">
    <h2>Track Order</h2>
    <input type="text" id="track-id" placeholder="Enter Order ID">
    <button class="btn-main" onclick="trackAction()">Track Now</button>
    <div id="track-output"></div>
</div>

<div id="orders-page" class="page">
    <h2>My History</h2>
    <div id="order-history-list"></div>
</div>

<div id="help-page" class="page">
    <h2>Help & Support</h2>
    <div class="info-card">
        <p>Bhai, koi dikkat ho toh mail karein:</p>
        <b>varungoyal7910@gmail.com</b>
    </div>
</div>

<!-- BOTTOM NAV -->
<nav>
    <div class="nav-item active" id="n-home" onclick="showPage('home-page')">🏠<br>Home</div>
    <div class="nav-item" id="n-track" onclick="showPage('track-page')">📍<br>Track</div>
    <div class="nav-item" id="n-orders" onclick="showPage('orders-page')">📦<br>Orders</div>
    <div class="nav-item" id="n-help" onclick="showPage('help-page')">🆘<br>Help</div>
</nav>

<script>
    const products = [
        { id: 1, name: "Vlogging Mic", price: 298, img: "https://images.unsplash.com/photo-1590658268037-6bf12165a8df?w=400" },
        { id: 2, name: "Tripod Stand", price: 149, img: "https://images.unsplash.com/photo-1516035069371-29a1b244cc32?w=400" }
    ];

    let cart = {}; // Cart object for quantity management

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.getElementById(id).classList.add('active-page');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        if(id.includes('home')) document.getElementById('n-home').classList.add('active');
        if(id === 'cart-page') renderCart();
        if(id === 'orders-page') renderOrders();
    }

    function init() {
        document.getElementById('product-list').innerHTML = products.map(p => `
            <div class="p-card" onclick="addToCart(${p.id})">
                <img src="${p.img}" class="p-img">
                <div class="p-info"><b>${p.name}</b><br><span>₹${p.price}</span></div>
            </div>`).join('');
    }

    function addToCart(id) {
        if(cart[id]) cart[id].qty++;
        else cart[id] = { ...products.find(p => p.id === id), qty: 1 };
        updateCartCount();
        alert("Added to cart!");
    }

    function updateCartCount() {
        let count = Object.values(cart).reduce((a, b) => a + b.qty, 0);
        document.getElementById('cart-count').innerText = count;
    }

    function renderCart() {
        const list = document.getElementById('cart-items-list');
        const items = Object.values(cart);
        if(items.length === 0) { list.innerHTML = "Cart is empty."; return; }
        
        list.innerHTML = items.map(i => `
            <div class="cart-item">
                <div><b>${i.name}</b><br>₹${i.price * i.qty}</div>
                <div>
                    <button class="qty-btn" onclick="changeQty(${i.id}, -1)">-</button>
                    <span style="margin:0 10px">${i.qty}</span>
                    <button class="qty-btn" onclick="changeQty(${i.id}, 1)">+</button>
                </div>
            </div>`).join('');
        
        let total = items.reduce((a, b) => a + (b.price * b.qty), 0);
        document.getElementById('cart-summary').innerHTML = `<h3>Total: ₹${total}</h3><button class="btn-main" onclick="showPage('checkout-page')">Checkout Now</button>`;
    }

    function changeQty(id, val) {
        cart[id].qty += val;
        if(cart[id].qty <= 0) delete cart[id];
        renderCart();
        updateCartCount();
    }

    function goToPayment() {
        const name = document.getElementById('u-name').value;
        if(!name) return alert("Pehle details bharo!");
        alert("Payment Page: Scan UPI and Enter UTR");
        finalizeOrder();
    }

    function finalizeOrder() {
        const orderID = "VAR" + Math.floor(1000 + Math.random() * 9000);
        let history = JSON.parse(localStorage.getItem('myOrders')) || [];
        history.push({ orderID, date: new Date().toLocaleDateString(), status: 'Pending' });
        localStorage.setItem('myOrders', JSON.stringify(history));
        cart = {}; updateCartCount();
        showPage('orders-page');
    }

    function renderOrders() {
        const list = document.getElementById('order-history-list');
        let history = JSON.parse(localStorage.getItem('myOrders')) || [];
        list.innerHTML = history.reverse().map(o => `<div class="info-card">ID: ${o.orderID} | ${o.date}<br>Status: ${o.status}</div>`).join('');
    }

    init();
</script>
</body>
</html>
