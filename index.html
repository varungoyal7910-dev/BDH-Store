<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Varun Store | Premium Collective</title>
    <style>
        :root { --bg: #ffffff; --surface: #f5f5f7; --text: #1d1d1f; --accent: #0071e3; --border: #d2d2d7; --error: #ff3b30; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }
        
        header { background: rgba(255,255,255,0.8); backdrop-filter: blur(20px); padding: 18px; position: sticky; top: 0; z-index: 1000; text-align: center; border-bottom: 0.5px solid var(--border); }
        .logo { font-size: 18px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; }

        .container { padding: 20px; padding-bottom: 120px; max-width: 600px; margin: auto; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .product-card { background: var(--surface); border-radius: 24px; padding: 10px; cursor: pointer; transition: transform 0.2s ease; }
        .product-card img { width: 100%; border-radius: 20px; display: block; }
        .product-info { padding: 12px 5px; text-align: center; }
        .product-info h4 { margin: 0; font-size: 14px; font-weight: 600; }
        .price { color: #86868b; font-size: 13px; margin-top: 4px; display: block; }

        nav { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 85%; max-width: 350px; background: rgba(29, 29, 31, 0.95); backdrop-filter: blur(20px); border-radius: 40px; display: flex; justify-content: space-around; padding: 12px; z-index: 1500; box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
        .nav-item { color: white; text-align: center; font-size: 10px; cursor: pointer; opacity: 0.6; position: relative; }
        .nav-item.active { opacity: 1; }
        .badge { position: absolute; top: -5px; right: -5px; background: var(--accent); color: white; font-size: 10px; width: 16px; height: 16px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }

        .overlay { position: fixed; inset: 0; background: white; z-index: 2000; display: none; flex-direction: column; animation: slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        
        .header-modal { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f2f2f2; }
        .content { padding: 25px; overflow-y: auto; flex: 1; }

        .cart-item { display: flex; justify-content: space-between; align-items: center; background: var(--surface); padding: 15px; border-radius: 20px; margin-bottom: 12px; }
        .qty-controls { display: flex; align-items: center; gap: 12px; background: white; padding: 6px 12px; border-radius: 30px; border: 1px solid #eee; }
        .qty-btn { cursor: pointer; font-size: 18px; border: none; background: none; padding: 0 5px; color: var(--accent); }

        input, textarea { width: 100%; background: var(--surface); border: 1.5px solid transparent; padding: 16px; border-radius: 14px; margin-bottom: 12px; font-size: 15px; box-sizing: border-box; outline: none; transition: 0.2s; }
        input:focus { border-color: var(--accent); background: white; }
        .error-text { color: var(--error); font-size: 12px; margin-top: -8px; margin-bottom: 10px; display: none; }

        .action-btn { width: 100%; padding: 18px; background: var(--text); color: white; border: none; border-radius: 18px; font-weight: 600; font-size: 16px; transition: 0.3s; }
        .action-btn:disabled { background: #d2d2d7; cursor: not-allowed; }

        .loader { width: 30px; height: 30px; border: 3px solid #f3f3f3; border-top: 3px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<header><div class="logo">VARUN<span>STORE</span></div></header>

<div class="container" id="main-view"></div>
<div id="modal" class="overlay"></div>

<nav>
    <div class="nav-item" onclick="location.reload()">🏠<br>Shop</div>
    <div class="nav-item" onclick="openBag()">🛍️<br>Bag <span id="cart-count" class="badge">0</span></div>
    <div class="nav-item" onclick="trackOrder()">📦<br>Track</div>
</nav>

<script>
    let cart = [];
    const upiID = "paytmqr281005050101cgeiryavx0ji@paytm";
    const scriptURL = "https://script.google.com/macros/s/AKfycbyHxyqsYCvwKlrp7j4VcOLiCOYutL518TOm4XoD51gTT9KH2DUoxgI4mxtef6NPiOCo/exec";

    const products = [
        { id: 1, name: "Premium Silicone Case", price: 95, img: "https://images.unsplash.com/photo-1544117518-2b041580c79d?w=300" },
        { id: 2, name: "Super Fast Charger", price: 145, img: "https://images.unsplash.com/photo-1625517407003-89c16bc18a5e?w=300" }
    ];

    function renderHome() {
        let html = '<div class="grid">';
        products.forEach(p => {
            html += `
                <div class="product-card" onclick="addToBag(${p.id})">
                    <img src="${p.img}">
                    <div class="product-info">
                        <h4>${p.name}</h4>
                        <span class="price">₹${p.price}</span>
                    </div>
                </div>`;
        });
        document.getElementById('main-view').innerHTML = html + '</div>';
    }

    function addToBag(id) {
        let p = products.find(x => x.id === id);
        let item = cart.find(i => i.id === id);
        if(item) item.qty++; else cart.push({...p, qty: 1});
        updateBadge();
    }

    function updateBadge() {
        document.getElementById('cart-count').innerText = cart.reduce((s, i) => s + i.qty, 0);
    }

    function changeQty(id, delta) {
        let item = cart.find(i => i.id === id);
        if(item) {
            item.qty += delta;
            if(item.qty < 1) cart = cart.filter(i => i.id !== id);
        }
        updateBadge();
        openBag();
    }

    function validateFields() {
        const phone = document.getElementById('v-phone').value;
        const pin = document.getElementById('v-pin').value;
        const btn = document.getElementById('checkout-btn');
        const phoneErr = document.getElementById('phone-err');
        
        const isPhoneValid = phone.length === 10;
        const isPinValid = pin.length >= 5;

        phoneErr.style.display = (phone.length > 0 && !isPhoneValid) ? 'block' : 'none';
        btn.disabled = !(isPhoneValid && isPinValid && document.getElementById('v-name').value && document.getElementById('v-addr').value);
    }

    function openBag() {
        if(!cart.length) return alert("Bag khali hai bhai!");
        const modal = document.getElementById('modal');
        modal.style.display = 'flex';
        let total = cart.reduce((s, i) => s + (i.price * i.qty), 0);
        
        modal.innerHTML = `
            <div class="header-modal"><h3>Bag</h3><span onclick="closeModal()" style="font-size:24px;">✕</span></div>
            <div class="content">
                ${cart.map(i => `
                    <div class="cart-item">
                        <div><b>${i.name}</b><br><small>₹${i.price}</small></div>
                        <div class="qty-controls">
                            <button class="qty-btn" onclick="changeQty(${i.id}, -1)">−</button>
                            <span>${i.qty}</span>
                            <button class="qty-btn" onclick="changeQty(${i.id}, 1)">+</button>
                        </div>
                    </div>
                `).join('')}
                
                <h4 style="margin:30px 0 15px;">Shipping Information</h4>
                <input type="text" id="v-name" placeholder="Full Name" oninput="validateFields()">
                <input type="tel" id="v-phone" placeholder="Phone Number (10 Digits)" maxlength="10" oninput="validateFields()">
                <div id="phone-err" class="error-text">Bhai, kam se kam 10 number zaruri hain!</div>
                <textarea id="v-addr" placeholder="Full Address" rows="3" oninput="validateFields()"></textarea>
                <input type="number" id="v-pin" placeholder="Pin Code (Min 5 Digits)" oninput="validateFields()">
                
                <div style="background:var(--surface); padding:20px; border-radius:20px; margin:20px 0; display:flex; justify-content:space-between; align-items:center;">
                    <span>Total Amount</span><b style="font-size:20px;">₹${total}</b>
                </div>
                <button id="checkout-btn" class="action-btn" onclick="placeOrder(${total})" disabled>Place Order</button>
            </div>`;
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    async function placeOrder(total) {
        const orderID = "VAR" + Math.floor(1000 + Math.random()*9000);
        const data = {
            name: document.getElementById('v-name').value,
            phone: document.getElementById('v-phone').value,
            address: document.getElementById('v-addr').value,
            pincode: document.getElementById('v-pin').value,
            total: total,
            orderID: orderID
        };

        // Data to Sheet
        fetch(scriptURL, { method: "POST", mode: "no-cors", body: JSON.stringify(data) });

        // Local Tracking
        let history = JSON.parse(localStorage.getItem('vOrders') || '[]');
        history.unshift({ ...data, date: new Date().toLocaleDateString(), status: "Wait for order confirming" });
        localStorage.setItem('vOrders', JSON.stringify(history));

        // Start UPI
        window.location.href = `upi://pay?pa=${upiID}&pn=Varun%20Goyal&am=${total}&cu=INR`;

        // Success Screen
        setTimeout(() => {
            document.getElementById('modal').innerHTML = `
                <div class="content" style="text-align:center; padding-top:60px;">
                    <div class="loader"></div>
                    <h2 style="letter-spacing:-0.5px;">Wait for order confirming</h2>
                    <p style="color:#86868b; line-height:1.5;">Humare system mein aapka order verify ho raha hai. Hum jald hi aapse sampark karenge.</p>
                    <div style="background:var(--surface); padding:25px; border-radius:24px; margin-top:40px; text-align:left;">
                        <p style="margin:0; font-size:13px; color:#86868b;">Order ID</p>
                        <b style="font-size:18px;">${orderID}</b>
                        <hr style="border:0; border-top:1px solid #e2e2e2; margin:15px 0;">
                        <p style="margin:0; font-size:13px; color:#86868b;">Current Status</p>
                        <b style="color:var(--accent);">System Checking...</b>
                    </div>
                    <button class="action-btn" onclick="location.reload()" style="margin-top:40px; background:#000;">Back to Shop</button>
                </div>`;
        }, 3000);
    }

    function trackOrder() {
        const history = JSON.parse(localStorage.getItem('vOrders') || '[]');
        const modal = document.getElementById('modal');
        modal.style.display = 'flex';
        modal.innerHTML = `
            <div class="header-modal"><h3>Track Orders</h3><span onclick="closeModal()">✕</span></div>
            <div class="content">
                ${history.length === 0 ? '<p style="color:#86868b; text-align:center;">Abhi koi order nahi hai bhai.</p>' : history.map(o => `
                    <div style="background:var(--surface); padding:20px; border-radius:24px; margin-bottom:15px;">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <b>${o.orderID}</b>
                            <span style="font-weight:600;">₹${o.total}</span>
                        </div>
                        <div style="margin-top:12px; font-size:13px; color:var(--accent); font-weight:600;">
                            Status: ${o.status}
                        </div>
                        <p style="font-size:11px; color:#86868b; margin-top:8px;">Placed on: ${o.date}</p>
                    </div>
                `).join('')}
            </div>`;
    }

    renderHome();
</script>
</body>
</html>
