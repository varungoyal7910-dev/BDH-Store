<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Varun Store</title>
    <style>
        :root { --accent: #e91e63; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); padding-bottom: 80px; }
        
        header { background: #fff; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 20px; font-weight: bold; color: var(--accent); }
        .cart-icon { font-size: 24px; cursor: pointer; position: relative; }
        .cart-count { position: absolute; top: -5px; right: -10px; background: red; color: #fff; font-size: 12px; padding: 2px 6px; border-radius: 50%; }

        /* Search & Permanent Filter Chips */
        .search-area { background: #fff; padding: 10px 15px; position: sticky; top: 55px; z-index: 90; border-bottom: 1px solid #eee; }
        .filter-chips { display: flex; gap: 8px; overflow-x: auto; padding: 5px 0; scrollbar-width: none; }
        .filter-chips::-webkit-scrollbar { display: none; }
        .chip { padding: 6px 15px; background: #f0f0f0; border-radius: 20px; font-size: 12px; cursor: pointer; white-space: nowrap; border: 1px solid transparent; }
        .chip.active { background: var(--accent); color: #fff; }

        /* Product Grid */
        .container { padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .p-card { background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.06); cursor: pointer; }
        .p-img { width: 100%; height: 150px; object-fit: cover; }
        .p-info { padding: 10px; text-align: left; }
        .p-name { font-size: 14px; font-weight: 600; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .price-row { margin-top: 5px; }
        .p-price { color: var(--accent); font-weight: bold; font-size: 16px; }
        .p-mrp { text-decoration: line-through; color: #888; font-size: 12px; margin-left: 5px; }
        .p-disc { color: green; font-size: 11px; font-weight: bold; }

        /* Detail Modal */
        .modal { position: fixed; inset: 0; background: #fff; z-index: 3000; display: none; flex-direction: column; overflow-y: auto; }
        .modal-header { padding: 15px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #eee; }
        .modal-body { padding: 15px; }
        .detail-img { width: 100%; border-radius: 10px; margin-bottom: 15px; }
        .color-dot { width: 30px; height: 30px; border-radius: 50%; display: inline-block; margin-right: 10px; border: 2px solid #ddd; cursor: pointer; }
        .policy-box { background: #f9f9f9; padding: 10px; border-radius: 8px; margin-top: 15px; font-size: 13px; }

        /* General Overlay & Nav */
        nav { position: fixed; bottom: 0; width: 100%; background: #fff; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #ddd; z-index: 1000; }
        .nav-item { text-align: center; font-size: 12px; color: #666; cursor: pointer; }
        .nav-item.active { color: var(--accent); font-weight: bold; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: flex-end; z-index: 2000; }
        .overlay-content { background: #fff; width: 100%; max-height: 85vh; border-radius: 20px 20px 0 0; padding: 20px; overflow-y: auto; }
        
        .btn-buy { background: var(--accent); color: #fff; border: none; padding: 15px; border-radius: 8px; width: 100%; font-size: 16px; font-weight: bold; margin-top: 20px; cursor: pointer; }
        .hidden { display: none; }
    </style>
</head>
<body>

<header>
    <div class="logo">Varun Store</div>
    <div class="cart-icon" onclick="openCart()">🛒 <span class="cart-count" id="cart-count">0</span></div>
</header>

<div id="home-page">
    <div class="search-area">
        <input type="text" id="search-input" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:8px;" placeholder="Search products..." onkeyup="filterBySearch()">
        <div class="filter-chips">
            <div class="chip active" onclick="applyFilter('all', this)">All</div>
            <div class="chip" onclick="applyFilter('low-high', this)">Low to High</div>
            <div class="chip" onclick="applyFilter('99', this)">Under 99</div>
            <div class="chip" onclick="applyFilter('149', this)">Under 149</div>
            <div class="chip" onclick="applyFilter('199', this)">Under 199</div>
            <div class="chip" onclick="applyFilter('499', this)">Under 499</div>
        </div>
    </div>
    <div id="product-list" class="container"></div>
</div>

<!-- Product Detail Modal -->
<div id="product-modal" class="modal">
    <div class="modal-header">
        <span style="font-size: 24px; cursor: pointer;" onclick="closeModal()">←</span>
        <b id="m-title">Product Details</b>
    </div>
    <div class="modal-body" id="modal-content"></div>
</div>

<nav>
    <div class="nav-item active" onclick="switchPage('home', this)">🏠<br>Home</div>
    <div class="nav-item" onclick="switchPage('orders', this)">📋<br>Orders</div>
</nav>

<div id="main-overlay" class="overlay">
    <div class="overlay-content">
        <div id="overlay-body"></div>
    </div>
</div>

<audio id="conf-sound" src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3"></audio>

<script>
    const upiID = "varungoyal7910@pnb";
    const products = [
        { id: 1, name: "Premium Silicone Case", price: 149, mrp: 399, disc: "62% OFF", img: "https://via.placeholder.com/300", desc: "Super soft silicone case with camera protection. Premium matte finish and dust proof.", colors: ["Black", "Blue", "Red"] },
        { id: 2, name: "Wireless Earbuds Pro", price: 499, mrp: 999, disc: "50% OFF", img: "https://via.placeholder.com/300", desc: "Deep bass, 20hrs battery life, and noise cancellation technology.", colors: ["White", "Black"] },
        { id: 3, name: "Fast Charging Cable", price: 89, mrp: 199, disc: "55% OFF", img: "https://via.placeholder.com/300", desc: "Braided 1.5m long cable. Supports 65W fast charging.", colors: ["Grey"] }
    ];

    let cart = [];

    function renderProducts(data = products) {
        document.getElementById('product-list').innerHTML = data.map(p => `
            <div class="p-card" onclick="openProduct(${p.id})">
                <img src="${p.img}" class="p-img">
                <div class="p-info">
                    <p class="p-name">${p.name}</p>
                    <div class="price-row">
                        <span class="p-price">₹${p.price}</span>
                        <span class="p-mrp">₹${p.mrp}</span>
                        <div class="p-disc">${p.disc}</div>
                    </div>
                </div>
            </div>`).join('');
    }
    renderProducts();

    function openProduct(id) {
        const p = products.find(x => x.id === id);
        document.getElementById('product-modal').style.display = 'flex';
        document.getElementById('modal-content').innerHTML = `
            <img src="${p.img}" class="detail-img">
            <h2>${p.name}</h2>
            <div style="margin-bottom:10px;">
                <span style="font-size:22px; font-weight:bold; color:var(--accent);">₹${p.price}</span>
                <span style="text-decoration:line-through; color:#888; margin-left:10px;">₹${p.mrp}</span>
                <span style="color:green; font-weight:bold; margin-left:10px;">${p.disc}</span>
            </div>
            <p style="color:#555; line-height:1.5;">${p.desc}</p>
            
            <h4>Select Color:</h4>
            ${p.colors.map(c => `<div class="color-dot" style="background:${c.toLowerCase()};" title="${c}"></div>`).join('')}
            
            <div class="policy-box">
                <b>✓ 7 Days Replacement Policy</b><br>
                <b>✓ High Quality Guaranteed</b><br>
                <b>✓ Free Delivery on ₹499+</b>
            </div>
            
            <button class="btn-buy" onclick="addToCart(${p.id}); closeModal(); openCart();">Add to Cart</button>
        `;
    }

    function closeModal() { document.getElementById('product-modal').style.display = 'none'; }

    function applyFilter(type, el) {
        document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        let res = [...products];
        if(type === 'low-high') res.sort((a,b) => a.price - b.price);
        else if(type !== 'all') res = products.filter(p => p.price <= parseInt(type));
        renderProducts(res);
    }

    function addToCart(id) {
        let item = cart.find(x => x.id === id);
        if(item) item.qty++; else cart.push({...products.find(x => x.id === id), qty: 1});
        document.getElementById('cart-count').innerText = cart.reduce((a,b) => a + b.qty, 0);
    }

    // Previous Cart/Payment logic remains same with the 2:00 timer & correct UPI ID
    function openCart() {
        const body = document.getElementById('overlay-body');
        document.getElementById('main-overlay').style.display = 'flex';
        if(cart.length === 0) { body.innerHTML = "<h3>Cart Empty</h3>"; return; }
        let total = cart.reduce((a,b) => a + (b.price * b.qty), 0);
        body.innerHTML = `<h3>Your Bag</h3>` + cart.map(i => `
            <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                <span>${i.name}</span>
                <span>₹${i.price} x ${i.qty}</span>
            </div>`).join('') + `<h4>Total: ₹${total}</h4><button class="btn-buy" onclick="openPayment(${total})">Pay Now</button>`;
    }

    function openPayment(total) {
        document.getElementById('overlay-body').innerHTML = `
            <div style="text-align:center;">
                <div style="background:#ffebee; padding:5px; border-radius:20px; font-weight:bold; color:red; margin-bottom:10px;">⏱ <span id="timer">02:00</span></div>
                <h3>Scan & Pay</h3>
                <p>Pay <b>₹${total}</b> to <b>${upiID}</b></p>
                <button onclick="navigator.clipboard.writeText('${upiID}'); alert('Copied!')" style="padding:5px 10px; margin-bottom:15px;">Copy UPI</button>
                <input type="text" id="ref-id" style="width:100%; padding:10px;" placeholder="Enter Transaction ID">
                <button class="btn-buy" onclick="confirmOrder()">Confirm Order</button>
            </div>`;
        // Timer Logic
        let time = 120;
        const t = setInterval(() => {
            let m = Math.floor(time/60), s = time%60;
            document.getElementById('timer').innerText = `${m}:${s<10?'0':''}${s}`;
            if(--time < 0) { clearInterval(t); alert("Time Over"); location.reload(); }
        }, 1000);
    }

    function confirmOrder() {
        document.getElementById('conf-sound').play();
        alert("Order Placed Successfully!");
        location.reload();
    }
</script>
</body>
</html>
