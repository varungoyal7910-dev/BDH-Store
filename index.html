    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GOCART | Premium Store</title>
    <style>
        :root { --g-orange: #FFB400; --g-navy: #131921; --g-white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f4f4f4; padding-bottom: 80px; }
        
        /* 1. HEADER (Web Name + Cart) */
        header { background: var(--g-navy); padding: 15px; color: white; position: sticky; top: 0; z-index: 1000; }
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .logo { font-size: 24px; font-weight: 900; }
        .logo span { color: var(--g-orange); }
        .cart-icon { font-size: 22px; cursor: pointer; position: relative; }
        #cart-count { position: absolute; top: -5px; right: -10px; background: var(--g-orange); color: var(--g-navy); font-size: 10px; padding: 2px 5px; border-radius: 50%; font-weight: bold; }

        /* 2. SEARCH BAR */
        .search-container { background: white; border-radius: 5px; display: flex; overflow: hidden; margin-bottom: 10px; }
        .search-container input { border: none; padding: 12px; width: 100%; outline: none; }
        .search-container button { background: var(--g-orange); border: none; padding: 0 15px; }

        /* 3. FILTERS */
        .filters { display: flex; gap: 8px; overflow-x: auto; padding: 5px 0; scrollbar-width: none; }
        .chip { background: rgba(255,255,255,0.1); border: 1px solid #444; padding: 6px 15px; border-radius: 20px; font-size: 11px; white-space: nowrap; color: white; }

        /* 4. TRUST ICONS */
        .trust-bar { display: flex; justify-content: space-around; background: #fff; padding: 10px; font-size: 11px; color: #555; border-bottom: 1px solid #eee; margin-bottom: 10px; }

        /* 5. PRODUCTS */
        .p-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
        .p-card { background: white; border-radius: 10px; padding: 12px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .p-card img { width: 100%; height: 110px; object-fit: contain; }

        /* BOTTOM NAV BUTTONS */
        nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #ddd; padding: 12px 0; z-index: 1000; }
        .nav-item { flex: 1; text-align: center; font-size: 11px; color: #666; font-weight: bold; cursor: pointer; }

        /* PAGES & UI */
        .page { display: none; padding: 15px; }
        .active-page { display: block; }
        .btn-main { background: var(--g-orange); color: white; border: none; width: 100%; padding: 15px; border-radius: 12px; font-size: 16px; font-weight: bold; }
        .form-input { width: 100%; padding: 14px; margin-bottom: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
    </style>
</head>
<body>

<header>
    <div class="header-top">
        <div class="logo">GO<span>CART</span></div>
        <div class="cart-icon" onclick="showPage('cart-page')">🛒<span id="cart-count">0</span></div>
    </div>
    <div class="search-container">
        <input type="text" placeholder="Search Premium Products...">
        <button>🔍</button>
    </div>
    <div class="filters">
        <div class="chip">Under ₹199</div>
        <div class="chip">New Arrival</div>
        <div class="chip">Top Rated</div>
    </div>
</header>

<div class="trust-bar">
    <span>🛡️ Secure Pay</span>
    <span>🚚 Fast Delivery</span>
    <span>⭐ Quality</span>
</div>

<!-- HOME PAGE -->
<div id="home-page" class="page active-page">
    <div class="p-grid">
        <div class="p-card" onclick="openDetails('Vlogging Mic', 99, 499, 'https://m.media-amazon.com/images/I/71Xmbe9Vp1L._SL1500_.jpg')">
            <img src="https://m.media-amazon.com/images/I/71Xmbe9Vp1L._SL1500_.jpg">
            <h4 style="font-size:12px; margin:8px 0;">Premium Vlogging Mic</h4>
            <div style="color:#B12704; font-weight:bold;">₹99</div>
        </div>
    </div>
</div>

<!-- PRODUCT DETAILS PAGE -->
<div id="details-page" class="page">
    <center><img id="det-img" src="" style="width:70%;"></center>
    <h2 id="det-title"></h2>
    <h3 id="det-price" style="color:#B12704;"></h3>
    <p>Professional grade audio quality for creators.</p>
    <b>Select Color:</b>
    <div style="margin:15px 0;">
        <button onclick="selCol('Black')" id="col-black" style="background:black; width:30px; height:30px; border-radius:50%; border:2px solid #ccc;"></button>
        <button onclick="selCol('Red')" id="col-red" style="background:red; width:30px; height:30px; border-radius:50%; border:2px solid #ccc; margin-left:10px;"></button>
    </div>
    <button class="btn-main" onclick="addToCart()">Add to Cart</button>
</div>

<!-- CART PAGE -->
<div id="cart-page" class="page">
    <h3>Your Cart 🛒</h3>
    <div id="cart-items" style="background:white; padding:15px; border-radius:10px; margin-bottom:20px;">
        <p style="color:#888;">Cart Khali Hai!</p>
    </div>
    <div id="cart-total" style="text-align:right; margin-bottom:20px; font-weight:bold;"></div>
    <button id="checkout-btn" class="btn-main" onclick="showPage('checkout-page')" style="display:none;">Checkout Now</button>
</div>

<!-- CHECKOUT & PAYMENT PAGES (Simplified) -->
<div id="checkout-page" class="page">
    <h3>Delivery Details</h3>
    <input type="text" id="u-name" class="form-input" placeholder="Full Name">
    <input type="text" id="u-phone" class="form-input" placeholder="Phone">
    <input type="text" id="u-addr" class="form-input" placeholder="Address">
    <button class="btn-main" onclick="showPage('payment-page')">Next</button>
</div>

<div id="payment-page" class="page" style="text-align:center;">
    <h3>Scan to Pay</h3>
    <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=upi://pay?pa=varungoyal7910@pnb" style="margin-bottom:20px;">
    <input type="text" id="u-utr" class="form-input" placeholder="Enter UTR Number">
    <button class="btn-main" onclick="confirmOrder()">Confirm Order</button>
</div>

<!-- MY ORDERS PAGE -->
<div id="orders-page" class="page">
    <h3>My Orders 📦</h3>
    <div id="orders-list"></div>
</div>

<!-- TRACK PAGE -->
<div id="track-page" class="page">
    <h3>Track Order 📍</h3>
    <input type="text" id="track-id" class="form-input" placeholder="Enter Order ID (VARxxxx)">
    <button class="btn-main" onclick="runTrack()">Track Now</button>
    <div id="track-res" style="margin-top:20px;"></div>
</div>

<!-- NAVIGATION -->
<nav>
    <div class="nav-item" onclick="showPage('home-page')">🏠<br>Home</div>
    <div class="nav-item" onclick="loadMyOrders()">📦<br>My Orders</div>
    <div class="nav-item" onclick="showPage('track-page')">📍<br>Track</div>
</nav>

<script>
    let cart = [];
    let selectedColor = "Black";
    let currentProd = {};
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxpq0xom4H-qEydf6-vI6x_oZGXhvMikC6u2rcPI-TA2qbdym0UKsiItv5geb-2aR9R/exec';

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.getElementById(id).classList.add('active-page');
        window.scrollTo(0,0);
    }

    function openDetails(t, p, o, i) {
        currentProd = {title: t, price: p, img: i};
        document.getElementById('det-title').innerText = t;
        document.getElementById('det-price').innerText = "₹" + p;
        document.getElementById('det-img').src = i;
        showPage('details-page');
    }

    function selCol(c) { selectedColor = c; alert("Color Selected: " + c); }

    function addToCart() {
        cart.push({...currentProd, color: selectedColor});
        updateCartUI();
        alert("Bhai, item cart mein add ho gaya!");
        showPage('home-page');
    }

    function updateCartUI() {
        document.getElementById('cart-count').innerText = cart.length;
        const list = document.getElementById('cart-items');
        if(cart.length == 0) {
            list.innerHTML = "<p>Cart Khali Hai!</p>";
            document.getElementById('checkout-btn').style.display = 'none';
            return;
        }
        let total = 0;
        list.innerHTML = cart.map((item, index) => {
            total += item.price;
            return `<div style="display:flex; justify-content:space-between; margin-bottom:10px; border-bottom:1px solid #eee; padding-bottom:5px;">
                <span>${item.title} (${item.color})</span>
                <b>₹${item.price}</b>
            </div>`;
        }).join('');
        document.getElementById('cart-total').innerText = "Total: ₹" + total;
        document.getElementById('checkout-btn').style.display = 'block';
    }

    async function confirmOrder() {
        const orderId = "VAR" + Math.floor(1000 + Math.random() * 9000);
        const data = {
            orderId: orderId,
            name: document.getElementById('u-name').value,
            product: cart.map(i => i.title).join(', '),
            status: "Pending"
        };
        // Sound & Success (Logic similar to previous)
        new Audio('https://www.soundjay.com/buttons/sounds/button-37a.mp3').play();
        alert("Order Placed! ID: " + orderId);
        let myOrders = JSON.parse(localStorage.getItem('gocart_orders')) || [];
        myOrders.push(data);
        localStorage.setItem('gocart_orders', JSON.stringify(myOrders));
        cart = []; updateCartUI();
        location.reload();
    }

    function loadMyOrders() {
        const orders = JSON.parse(localStorage.getItem('gocart_orders')) || [];
        document.getElementById('orders-list').innerHTML = orders.map(o => `
            <div style="background:white; padding:15px; border-radius:10px; margin-bottom:10px;">
                <b>ID: ${o.orderId}</b> - <span style="color:orange;">${o.status}</span><br>${o.product}
            </div>
        `).join('');
        showPage('orders-page');
    }

    function runTrack() {
        const id = document.getElementById('track-id').value;
        const orders = JSON.parse(localStorage.getItem('gocart_orders')) || [];
        const found = orders.find(o => o.orderId === id);
        document.getElementById('track-res').innerHTML = found ? `Status: ${found.status}` : "ID Not Found!";
    }
</script>

</body>
</html>
